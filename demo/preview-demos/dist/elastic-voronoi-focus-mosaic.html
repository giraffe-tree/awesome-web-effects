<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js — Elastic Habitat Evidence Mosaic</title>
    <link rel="icon" href="data:," />
    <style>
      :root {
        --preview-background: #07100f;
        color-scheme: dark;
      }

      button { font: inherit; }

      .voronoi-stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
        background: #07100f;
        color: #f4efe4;
        isolation: isolate;
        user-select: none;
      }

      .mosaic-surface,
      .mosaic-surface canvas,
      .scene-grade,
      .scene-grain {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .mosaic-surface {
        z-index: 1;
        cursor: crosshair;
        outline: none;
        touch-action: none;
      }

      .mosaic-surface:focus-visible {
        box-shadow: inset 0 0 0 2px #e9ff9b;
      }

      .mosaic-surface canvas,
      .scene-grade,
      .scene-grain { pointer-events: none; }

      .scene-grade {
        z-index: 2;
        background:
          linear-gradient(180deg, #03100db8 0%, transparent 30%, transparent 56%, #020b09d6 100%),
          linear-gradient(90deg, #020a087a 0%, transparent 30%, transparent 76%, #02090838 100%);
      }

      .scene-grain {
        z-index: 3;
        opacity: .1;
        mix-blend-mode: soft-light;
        background-image: radial-gradient(#fff8 .45px, transparent .6px);
        background-size: 3px 3px;
      }

      .topbar {
        position: absolute;
        z-index: 6;
        top: 11px;
        left: 12px;
        right: 12px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 10px;
        pointer-events: none;
      }

      .identity {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .identity-mark {
        display: grid;
        width: 25px;
        height: 25px;
        flex: 0 0 auto;
        place-items: center;
        border: 1px solid #ecf3db73;
        border-radius: 50%;
        background: #06110ec7;
        color: #e9ff9b;
        font: 950 6px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: -.03em;
        backdrop-filter: blur(8px);
      }

      .identity-copy strong,
      .identity-copy span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-transform: uppercase;
      }

      .identity-copy strong {
        font: 900 6px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .14em;
      }

      .identity-copy span {
        margin-top: 4px;
        color: #e5e9dba6;
        font: 750 4px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .12em;
      }

      .voronoi-stage .library-badge {
        position: static;
        max-width: 126px;
        padding: 5px 7px;
        border-color: #eff5e14d;
        background: #06110ec2;
        color: #eef3e6;
        font: 850 4px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .12em;
        white-space: nowrap;
        backdrop-filter: blur(8px);
      }

      .focus-readout {
        position: absolute;
        z-index: 7;
        left: 12px;
        bottom: 11px;
        display: grid;
        grid-template-columns: auto auto;
        align-items: end;
        gap: 9px;
        max-width: calc(100% - 120px);
        pointer-events: none;
      }

      .focus-index {
        display: grid;
        width: 31px;
        height: 31px;
        place-items: center;
        border: 1px solid #ecf3db57;
        border-radius: 50%;
        background: #06110ec4;
        color: #e9ff9b;
        font: 950 8px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        backdrop-filter: blur(9px);
      }

      .result-copy { min-width: 0; }

      .result-copy .status {
        display: flex;
        align-items: center;
        gap: 5px;
        color: #e9ff9b;
        font: 900 4px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .14em;
        text-transform: uppercase;
      }

      .result-copy .status::before {
        width: 12px;
        height: 2px;
        border-radius: 2px;
        background: #e9ff9b;
        box-shadow: 0 0 7px #dfff76;
        content: "";
      }

      .result-copy h1 {
        overflow: hidden;
        margin: 4px 0 0;
        color: #fffaf0;
        font: 650 clamp(13px, 4.4vw, 27px)/.86 Georgia, "Times New Roman", serif;
        letter-spacing: -.052em;
        text-overflow: ellipsis;
        text-wrap: nowrap;
      }

      .result-copy p {
        margin: 4px 0 0;
        color: #e7ead9bf;
        font: 760 4px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .1em;
        text-transform: uppercase;
      }

      .controls {
        position: absolute;
        z-index: 8;
        right: 12px;
        bottom: 11px;
        display: flex;
        align-items: center;
        gap: 3px;
        padding: 3px;
        border: 1px solid #edf3df57;
        border-radius: 999px;
        background: #06110ed1;
        backdrop-filter: blur(9px);
      }

      .controls button {
        display: grid;
        min-width: 25px;
        height: 22px;
        padding: 0 7px;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: #f2f2e9;
        cursor: pointer;
        font: 900 5px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .09em;
        text-transform: uppercase;
      }

      .controls button[data-focus-action="lock"] {
        background: #e9ff9b;
        color: #102015;
      }

      .controls button:hover { background: #ffffff18; }
      .controls button[data-focus-action="lock"]:hover { background: #f2ffbf; }

      .controls button:focus-visible {
        outline: 1px solid #fff;
        outline-offset: 1px;
      }

      .runtime-ledger {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip-path: inset(50%);
      }

      @media (max-width: 210px), (max-height: 105px) {
        .topbar { top: 6px; left: 7px; right: 7px; }
        .identity-mark { width: 20px; height: 20px; font-size: 5px; }
        .identity-copy, .voronoi-stage .library-badge { display: none; }
        .focus-readout { left: 7px; bottom: 6px; max-width: calc(100% - 14px); gap: 5px; }
        .focus-index { width: 23px; height: 23px; font-size: 6px; }
        .result-copy h1 { margin-top: 3px; font-size: 11px; }
        .result-copy p { display: none; }
        .result-copy .status { font-size: 3.5px; }
        .controls { top: 6px; right: 7px; bottom: auto; gap: 1px; padding: 2px; }
        .controls button { min-width: 20px; height: 19px; padding: 0 5px; font-size: 4px; }
        .controls button span { display: none; }
      }
    </style>
    <script type="module" crossorigin src="./assets/elastic-voronoi-focus-mosaic-CNIgt5vM.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-DJbJzhDe.js">
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-CNC7AqOf.js">
    <link rel="modulepreload" crossorigin href="./assets/app-Dj3RhBXi.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main id="voronoi-stage" class="preview-stage voronoi-stage" data-preview-mechanism="p5-pixel-evidence-weighted-voronoi-focus">
      <div id="mosaic-surface" class="mosaic-surface" role="application" tabindex="0" aria-label="Coastal habitat evidence mosaic. Move or drag to enlarge the nearest image region; use arrow keys to move, Enter to lock, and Home to reset."></div>
      <div class="scene-grade"></div>
      <div class="scene-grain"></div>

      <header class="topbar" aria-hidden="true">
        <div class="identity">
          <span class="identity-mark">CS</span>
          <span class="identity-copy">
            <strong>Coastscan / 017</strong>
            <span>Restoration evidence field</span>
          </span>
        </div>
        <span class="library-badge">p5.js · Pixel Voronoi</span>
      </header>

      <section class="focus-readout" aria-live="polite">
        <span id="focus-index" class="focus-index">07</span>
        <div class="result-copy">
          <span id="focus-status" class="status">Focused evidence</span>
          <h1 id="focus-label">Tidal water</h1>
          <p><span id="focus-confidence">88% match</span> · <span id="focus-area">1.42× area</span></p>
        </div>
      </section>

      <nav class="controls" aria-label="Evidence focus controls">
        <button type="button" data-focus-action="previous" aria-label="Previous evidence region">←<span> Prev</span></button>
        <button type="button" data-focus-action="lock" aria-label="Lock focused evidence"><span>Lock</span> ✓</button>
        <button type="button" data-focus-action="next" aria-label="Next evidence region"><span>Next </span>→</button>
        <button type="button" data-focus-action="reset" aria-label="Reset evidence focus">↺</button>
      </nav>

      <output id="runtime-ledger" class="runtime-ledger" aria-hidden="true"></output>
    </main>
  </body>
</html>
