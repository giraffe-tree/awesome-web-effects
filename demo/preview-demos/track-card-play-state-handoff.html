<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Motion — Track Card Play-state Handoff</title><link rel="stylesheet" href="./shared.css"/><style>
:root{--preview-background:#121014}.track-stage{background:linear-gradient(145deg,#151116,#281b29);color:#fff}.track-title{position:absolute;left:16px;top:42px;font:900 17px/.9 Georgia,serif;letter-spacing:-.05em}.track-title small{display:block;margin-top:6px;color:#a48ea7;font:800 6px/1 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase}.track-list{position:absolute;left:16px;right:16px;top:74px;display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.track-card{position:relative;height:76px;padding:7px;border:1px solid #ffffff1e;border-radius:12px;background:#ffffff09;color:#fff;text-align:left;cursor:pointer;overflow:hidden}.record{width:38px;height:38px;border-radius:50%;background:repeating-radial-gradient(circle,#111 0 3px,#392c3b 4px 6px);box-shadow:inset 0 0 0 10px #0004}.record::after{content:"";display:block;width:8px;height:8px;margin:15px;border-radius:50%;background:var(--tone)}.track-card b{position:absolute;left:8px;bottom:9px;font:900 6px/1 ui-monospace,monospace;letter-spacing:.07em;text-transform:uppercase}.track-progress{position:absolute;left:54px;right:7px;top:25px;height:2px;background:#ffffff17}.track-progress::after{content:"";display:block;width:100%;height:100%;background:var(--tone);transform:scaleX(var(--p,0));transform-origin:left}.track-card[aria-pressed="true"]{border-color:var(--tone);background:#ffffff12}.scene-caption{display:none}
</style></head><body><main class="preview-stage track-stage"><div class="track-title">ONE TRACK WAKES<br/>AS ANOTHER RESTS<small>cover · control · progress hand off together</small></div><div class="track-list"><button class="track-card" style="--tone:#ff7b9b" aria-pressed="true"><i class="record"></i><i class="track-progress"></i><b>Soft current</b></button><button class="track-card" style="--tone:#71e8d1" aria-pressed="false"><i class="record"></i><i class="track-progress"></i><b>Night glass</b></button><button class="track-card" style="--tone:#f5d568" aria-pressed="false"><i class="record"></i><i class="track-progress"></i><b>Slow flare</b></button></div><span class="library-badge">Motion · coordinated play state</span><span class="scene-caption">the whole card wakes, progresses and yields to the next track</span></main><script type="module" src="./src/track-card-play-state-handoff-demo.js"></script></body></html>
