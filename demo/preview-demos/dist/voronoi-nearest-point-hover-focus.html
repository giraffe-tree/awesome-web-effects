<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js — Nearest Sensor Incident Attribution</title>
    <style>
      :root {
        --preview-background: #071217;
        --ink: #e9f4f1;
        --muted: #829a94;
        --cyan: #72e4d2;
        --acid: #d9ff59;
        --amber: #ffb452;
      }

      * { box-sizing: border-box; }
      button { font: inherit; }

      .sensor-stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
        color: var(--ink);
        background: #071217;
      }

      .voronoi-host {
        position: absolute;
        inset: 0;
        cursor: crosshair;
        touch-action: none;
        outline: none;
      }

      .voronoi-host canvas {
        width: 100% !important;
        height: 100% !important;
      }

      .voronoi-host:focus-visible::after {
        content: "";
        position: absolute;
        inset: 4px;
        border: 1px solid var(--acid);
        border-radius: 5px;
        pointer-events: none;
      }

      .masthead {
        position: absolute;
        z-index: 6;
        top: 40px;
        left: 11px;
        display: grid;
        gap: 2px;
        pointer-events: none;
      }

      .eyebrow,
      .nearest-label,
      .nearest-distance,
      .reading-label,
      .decision-label,
      .decision-copy,
      .keyboard-hint,
      .undo-button {
        font-size: clamp(6px, 1.2vw, 9px);
        font-weight: 900;
        letter-spacing: .11em;
        text-transform: uppercase;
      }

      .eyebrow { color: rgba(233, 244, 241, .48); }
      .masthead strong {
        font-size: clamp(13px, 3vw, 25px);
        font-weight: 950;
        line-height: .87;
        letter-spacing: -.055em;
      }

      .nearest-panel {
        position: absolute;
        z-index: 6;
        top: 10px;
        right: 10px;
        display: grid;
        grid-template-columns: auto auto;
        align-items: baseline;
        gap: 2px 8px;
        min-width: 105px;
        padding: 6px 8px;
        border: 1px solid rgba(114, 228, 210, .17);
        border-radius: 5px;
        background: rgba(7, 18, 23, .74);
        backdrop-filter: blur(9px);
        pointer-events: none;
      }

      .nearest-label { grid-column: 1 / -1; color: rgba(233, 244, 241, .45); }
      .nearest-id {
        color: var(--cyan);
        font: 950 clamp(11px, 2.8vw, 22px)/1 ui-monospace, monospace;
        letter-spacing: -.05em;
      }
      .nearest-distance { color: rgba(233, 244, 241, .55); text-align: right; }

      .reading-card {
        position: absolute;
        z-index: 6;
        bottom: 10px;
        left: 10px;
        width: clamp(82px, 25vw, 190px);
        padding: clamp(7px, 1.4vw, 11px);
        border: 1px solid rgba(114, 228, 210, .16);
        border-radius: 5px;
        background: rgba(9, 25, 31, .82);
        box-shadow: 0 12px 28px rgba(0, 0, 0, .2);
        backdrop-filter: blur(9px);
        pointer-events: none;
      }

      .reading-label { color: rgba(233, 244, 241, .42); }
      .reading-value {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 5px;
        margin-top: 4px;
        color: var(--amber);
      }
      .reading-value strong { font-size: clamp(16px, 4vw, 32px); line-height: .85; letter-spacing: -.06em; }
      .reading-value span { font: 850 clamp(6px, 1vw, 8px)/1 ui-monospace, monospace; letter-spacing: .08em; }

      .decision-card {
        position: absolute;
        z-index: 7;
        right: 10px;
        bottom: 10px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 3px 8px;
        width: clamp(116px, 31vw, 240px);
        min-height: 37px;
        padding: 6px 7px;
        border: 1px solid rgba(217, 255, 89, .16);
        border-radius: 5px;
        background: rgba(7, 18, 23, .84);
        box-shadow: 0 12px 28px rgba(0, 0, 0, .22);
        backdrop-filter: blur(9px);
      }

      .decision-label { color: var(--acid); }
      .decision-copy {
        grid-column: 1 / -1;
        overflow: hidden;
        color: rgba(233, 244, 241, .58);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .undo-button {
        grid-column: 2;
        grid-row: 1;
        padding: 4px 6px;
        border: 1px solid rgba(233, 244, 241, .2);
        border-radius: 3px;
        color: var(--ink);
        background: rgba(233, 244, 241, .05);
        cursor: pointer;
        outline: none;
      }
      .undo-button:disabled { opacity: .32; cursor: default; }
      .undo-button:focus-visible { border-color: var(--acid); box-shadow: 0 0 0 2px rgba(217, 255, 89, .14); }

      .keyboard-hint {
        position: absolute;
        z-index: 5;
        top: 45px;
        right: 12px;
        color: rgba(233, 244, 241, .42);
        pointer-events: none;
      }

      .library-badge { background: rgba(7, 18, 23, .88); }
      .scene-caption { display: none; }

      @media (max-width: 430px) and (max-height: 250px) {
        .keyboard-hint { display: none; }
      }

      @media (max-aspect-ratio: 4 / 5) {
        .masthead { top: 42px; }
        .nearest-panel { top: 42px; }
        .reading-card { right: calc(50% + 3px); bottom: 10px; left: 10px; width: auto; }
        .decision-card { right: 10px; bottom: 10px; left: calc(50% + 3px); width: auto; }
        .keyboard-hint { display: none; }
      }
    </style>
    <script type="module" crossorigin src="./assets/voronoi-nearest-point-hover-focus-rIDrCStX.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-DRJThx9H.js">
    <link rel="modulepreload" crossorigin href="./assets/shared-CArD_xX8.js">
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-CNC7AqOf.js">
    <link rel="modulepreload" crossorigin href="./assets/app-Dj3RhBXi.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage">
      <section class="sensor-stage" id="sensor-stage" data-preview-mechanism="trusted-nearest-data-coordinate-selection-over-authored-voronoi-cells-with-retained-review-decision" data-phase="waiting" data-active-station="none">
        <div class="voronoi-host" id="voronoi-host" tabindex="0" role="application" aria-label="City sensor attribution field. Move to select the mathematically nearest station, click or press Enter to confirm, use arrows to select, and U to undo."></div>

        <header class="masthead">
          <span class="eyebrow">Civic air grid · incident 24</span>
          <strong>Attribute the<br />event.</strong>
        </header>

        <section class="nearest-panel" aria-live="polite">
          <span class="nearest-label">Nearest measured station</span>
          <output class="nearest-id" id="nearest-id">—</output>
          <output class="nearest-distance" id="nearest-distance">Move in field</output>
        </section>

        <section class="reading-card">
          <span class="reading-label">PM2.5 reading</span>
          <output class="reading-value"><strong id="reading-value">—</strong><span>µg / m³</span></output>
        </section>

        <section class="decision-card" aria-live="polite">
          <output class="decision-label" id="decision-label">No review lock</output>
          <button class="undo-button" id="undo-decision" type="button" disabled>Undo</button>
          <output class="decision-copy" id="decision-copy">Move, then click a cell to confirm</output>
        </section>

        <span class="keyboard-hint">← → select · Enter confirm · U undo</span>
      </section>
      <span class="library-badge">p5.js · Voronoi attribution</span>
      <span class="scene-caption">real sensor coordinates generate every cell and nearest-point decision</span>
    </main>
  </body>
</html>
