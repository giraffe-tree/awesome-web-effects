<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js — Retained Image Palette</title>
    <style>
      :root {
        --preview-background: #142028;
        --palette-ink: #fff8e9;
        --palette-muted: rgba(255, 248, 233, .64);
        --palette-line: rgba(255, 248, 233, .2);
        --palette-panel: rgba(11, 17, 20, .7);
        --palette-active: #d2a379;
      }

      * { box-sizing: border-box; }
      button { font: inherit; }

      .palette-stage {
        position: absolute;
        inset: 0;
        overflow: hidden;
        color: var(--palette-ink);
        background: #142028;
      }

      #palette-host,
      #palette-host canvas {
        position: absolute;
        inset: 0;
        width: 100% !important;
        height: 100% !important;
        pointer-events: none;
      }

      .palette-stage::after {
        position: absolute;
        z-index: 2;
        inset: 0;
        background: linear-gradient(90deg, rgba(5, 9, 10, .25), transparent 53%);
        content: "";
        pointer-events: none;
      }

      .palette-copy {
        position: absolute;
        z-index: 5;
        top: 42px;
        left: 13px;
        display: grid;
        width: 99px;
        gap: 5px;
        pointer-events: none;
      }

      .palette-copy small,
      .palette-copy p,
      .palette-chip,
      .kept-label,
      .kept-value,
      .stay-nav button,
      .action-row button {
        font-size: clamp(5.3px, 1.13vw, 8.5px);
        font-weight: 850;
        letter-spacing: .1em;
        text-transform: uppercase;
      }

      .palette-copy small { color: var(--palette-active); }
      .palette-copy h1 {
        margin: 1px 0 0;
        font: 950 clamp(17px, 4.1vw, 31px)/.82 Georgia, serif;
        letter-spacing: -.06em;
      }
      .palette-copy p { margin: 0; color: var(--palette-muted); line-height: 1.35; }

      .image-frame {
        position: absolute;
        z-index: 3;
        top: 21px;
        right: 10px;
        bottom: 44px;
        left: 118px;
        border: 1px solid rgba(255, 255, 255, .25);
        border-radius: 12px;
        pointer-events: none;
      }

      .palette-chip {
        position: absolute;
        z-index: 6;
        top: 29px;
        right: 18px;
        display: flex;
        align-items: center;
        gap: 5px;
        min-width: 76px;
        height: 18px;
        padding: 0 6px;
        border: 1px solid rgba(255, 255, 255, .3);
        border-radius: 99px;
        color: white;
        background: rgba(7, 10, 10, .53);
        box-shadow: 0 5px 18px rgba(0, 0, 0, .2);
        backdrop-filter: blur(8px);
      }

      .palette-swatches { display: flex; gap: 2px; }
      .palette-swatches i {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, .3);
      }

      .palette-controls {
        position: absolute;
        z-index: 9;
        right: 10px;
        bottom: 8px;
        left: 10px;
        display: grid;
        grid-template-columns: minmax(116px, 1fr) minmax(90px, .72fr);
        gap: 5px;
      }

      .stay-nav,
      .commit-deck {
        display: grid;
        align-items: center;
        border: 1px solid var(--palette-line);
        border-radius: 7px;
        background: var(--palette-panel);
        backdrop-filter: blur(12px);
      }

      .stay-nav {
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
        padding: 3px;
      }

      .stay-nav button,
      .action-row button {
        min-width: 0;
        height: 23px;
        padding: 0 5px;
        border: 0;
        border-radius: 4px;
        color: rgba(255, 255, 255, .56);
        background: transparent;
        cursor: pointer;
        outline: none;
      }

      .stay-nav button[aria-pressed="true"] { color: white; background: rgba(255, 255, 255, .11); }
      .stay-nav button[data-kept="true"] { box-shadow: inset 0 -2px 0 var(--palette-active); }
      .stay-nav button:focus-visible,
      .action-row button:focus-visible { box-shadow: inset 0 0 0 1px white; }

      .commit-deck {
        grid-template-columns: minmax(45px, 1fr) auto;
        gap: 2px 4px;
        padding: 3px 4px 3px 7px;
      }

      .kept-label { color: var(--palette-muted); }
      .kept-value {
        overflow: hidden;
        color: var(--palette-active);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .action-row { display: flex; grid-row: 1 / 3; grid-column: 2; gap: 2px; }
      .action-row button { padding-inline: 6px; border: 1px solid rgba(255, 255, 255, .13); }
      .action-row button:disabled { opacity: .3; cursor: default; }
      .action-row .keep { color: #14150f; background: var(--palette-active); border-color: var(--palette-active); }

      .library-badge { border-color: var(--palette-line); color: var(--palette-ink); background: var(--palette-panel); }
      .scene-caption { display: none; }

      @media (max-width: 430px) and (max-height: 250px) {
        .kept-label { display: none; }
        .kept-value { grid-row: 1 / 3; align-self: center; }
      }

      @media (max-aspect-ratio: 4 / 5) {
        .palette-copy { top: 45px; width: 118px; }
        .palette-copy h1 { font-size: clamp(18px, 9vw, 28px); }
        .image-frame { top: 99px; right: 11px; bottom: 87px; left: 11px; border-radius: 11px; }
        .palette-chip { top: 107px; right: 19px; }
        .palette-controls { grid-template-columns: 1fr; bottom: 9px; }
        .stay-nav button, .action-row button { height: 25px; }
        .commit-deck { min-height: 38px; }
        .palette-stage::after { background: linear-gradient(rgba(5, 9, 10, .16), transparent 42%); }
      }
    </style>
    <script type="module" crossorigin src="./assets/image-palette-ambient-color-transition-C6KEIuMD.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-DRJThx9H.js">
    <link rel="modulepreload" crossorigin href="./assets/shared-CArD_xX8.js">
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-CNC7AqOf.js">
    <link rel="modulepreload" crossorigin href="./assets/app-Dj3RhBXi.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage">
      <section class="palette-stage" id="palette-stage" data-preview-mechanism="trusted-candidate-image-selection-drives-real-pixel-palette-preview-before-explicit-retained-keep" data-phase="waiting">
        <div id="palette-host" aria-hidden="true"></div>
        <div class="image-frame" id="image-frame" aria-hidden="true"></div>

        <section class="palette-copy" aria-live="polite">
          <small id="stay-kicker">Coast · sea-level calm</small>
          <h1 id="stay-name">AEGEAN<br />HUSH</h1>
          <p id="stay-location">Amorgos · Greece<br /><span id="stay-price">$240 / night</span></p>
        </section>

        <output class="palette-chip" id="palette-chip" aria-label="Palette sampled from the candidate photograph">
          <span class="palette-swatches" aria-hidden="true"><i></i><i></i><i></i></span>
          <span id="palette-value">SAMPLING</span>
        </output>

        <section class="palette-controls">
          <nav class="stay-nav" id="stay-nav" aria-label="Candidate atmosphere">
            <button type="button" data-stay="0" data-kept="true" aria-pressed="true">Coast</button>
            <button type="button" data-stay="1" data-kept="false" aria-pressed="false">Court</button>
            <button type="button" data-stay="2" data-kept="false" aria-pressed="false">Desert</button>
          </nav>

          <section class="commit-deck" aria-live="polite">
            <span class="kept-label">Retained palette</span>
            <output class="kept-value" id="kept-value">Aegean Hush</output>
            <div class="action-row">
              <button class="keep" id="keep-action" type="button" disabled>Keep</button>
              <button id="undo-action" type="button" disabled>Undo</button>
              <button id="reset-action" type="button" disabled>Reset</button>
            </div>
          </section>
        </section>

        <span class="library-badge">p5.js · verified image pixels</span>
        <span class="scene-caption">human candidate selection · sampled ambience · explicit retention</span>
      </section>
    </main>
  </body>
</html>
