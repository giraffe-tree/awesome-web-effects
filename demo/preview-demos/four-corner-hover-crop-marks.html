<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Motion — Four-corner Hover Crop Marks</title><link rel="stylesheet" href="./shared.css"/><style>
:root{--preview-background:#100d0b}.crop-stage{background:linear-gradient(145deg,#100d0b,#251b15)}.crop-card{position:absolute;left:36px;top:36px;width:248px;height:126px;overflow:hidden;border-radius:3px;background:linear-gradient(135deg,#d17a4a,#2a6273 55%,#141d21);cursor:crosshair}.crop-card::before{content:"";position:absolute;inset:-20px;background:radial-gradient(ellipse at 35% 65%,#f2c37e 0 10%,transparent 11%),linear-gradient(145deg,transparent 38%,#071215aa 39% 56%,transparent 57%);transform:rotate(-4deg)}.crop-title{position:absolute;left:13px;bottom:12px;color:#fff;font:900 19px/.82 Georgia,serif;letter-spacing:-.06em;text-shadow:0 3px 15px #000}.crop-mark{position:absolute;width:18px;height:18px;opacity:0}.crop-mark::before,.crop-mark::after{content:"";position:absolute;background:#fff}.crop-mark::before{width:18px;height:2px}.crop-mark::after{width:2px;height:18px}.crop-mark.tl{left:7px;top:7px}.crop-mark.tr{right:7px;top:7px}.crop-mark.tr::before,.crop-mark.tr::after{right:0}.crop-mark.bl{left:7px;bottom:7px}.crop-mark.bl::before,.crop-mark.bl::after{bottom:0}.crop-mark.br{right:7px;bottom:7px}.crop-mark.br::before,.crop-mark.br::after{right:0;bottom:0}.crop-coordinate{position:absolute;right:11px;bottom:10px;color:#fff;font:800 5px/1 ui-monospace,monospace;letter-spacing:.08em}.scene-caption{display:none}
</style></head><body><main class="preview-stage crop-stage"><article class="crop-card" id="crop-card" tabindex="0" aria-label="Hover or focus to reveal four crop marks"><b class="crop-title">FRAME<br/>THE WILD</b><i class="crop-mark tl"></i><i class="crop-mark tr"></i><i class="crop-mark bl"></i><i class="crop-mark br"></i><span class="crop-coordinate">X 036 / Y 018</span></article><span class="library-badge">Motion · editorial crop intent</span><span class="scene-caption">four marks frame the image without scaling it</span></main><script type="module" src="./src/four-corner-hover-crop-marks-demo.js"></script></body></html>
