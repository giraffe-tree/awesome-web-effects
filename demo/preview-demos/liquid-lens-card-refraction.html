<!doctype html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Liquid Lens Card Refraction</title><link rel="stylesheet" href="./shared.css"><style>:root{--preview-background:#0d1930}.preview-stage{background:radial-gradient(circle at 75% 35%,#ff7d5455,transparent 30%),linear-gradient(135deg,#0d1930,#172b4e)}.copy{position:absolute;left:14px;top:50px;color:#eef6ff;width:100px}.copy small{font:800 6px monospace;letter-spacing:.14em;color:#8fdfff}.copy h1{margin:8px 0;font:950 20px/.84 system-ui;letter-spacing:-.065em}.card{position:absolute;left:143px;top:38px;width:146px;height:108px;border:1px solid #fff3;border-radius:18px;background:repeating-linear-gradient(115deg,#fb7e52 0 18px,#ffc768 19px 36px,#4cd2dc 37px 54px,#6f65dc 55px 72px);overflow:hidden}.card::after{content:"REFRACT";position:absolute;left:16px;bottom:13px;color:#fff;font:950 18px/.8 system-ui;letter-spacing:-.07em}.lens{position:absolute;width:69px;height:69px;border-radius:50%;left:var(--x,38px);top:var(--y,20px);backdrop-filter:blur(2px) saturate(1.7) hue-rotate(28deg);background:#fff1;border:1px solid #fff9;box-shadow:inset -10px -12px 18px #0b164077,inset 9px 7px 14px #fff8,0 10px 24px #06102788;transform:scale(var(--s,1))}.scene-caption{display:none}</style></head><body><main class="preview-stage"><section class="copy"><small>OPTICAL SURFACE</small><h1>DRAG A LIQUID LENS.</h1></section><div class="card" tabindex="0"><i class="lens" id="lens"></i></div><span class="library-badge">CSS backdrop-filter · lens</span></main><script type="module" src="./src/liquid-lens-card-refraction-demo.js"></script></body></html>
