<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion — Hover-activated Image Marquee Menu</title>
    <style>
      :root {
        --preview-background: #e8e4da;
        color-scheme: light;
      }

      .image-menu {
        position: absolute;
        inset: 0;
        overflow: hidden;
        color: #171a17;
        background:
          radial-gradient(circle at 82% 8%, rgba(255, 255, 255, .68), transparent 29%),
          #e8e4da;
      }

      .folio {
        position: absolute;
        z-index: 8;
        top: 12px;
        right: 10px;
        color: rgba(23, 26, 23, .54);
        font: 750 6px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .13em;
        text-transform: uppercase;
      }

      .menu-list {
        position: absolute;
        left: 8px;
        right: 8px;
        top: 39px;
        bottom: 9px;
        display: grid;
        grid-template-rows: repeat(3, minmax(0, 1fr));
        overflow: hidden;
        border-top: 1px solid rgba(23, 26, 23, .3);
        border-bottom: 1px solid rgba(23, 26, 23, .3);
        background: rgba(248, 245, 236, .3);
      }

      .menu-row {
        --accent: #e9bb61;
        position: relative;
        min-width: 0;
        overflow: hidden;
        padding: 0;
        border: 0;
        border-bottom: 1px solid rgba(23, 26, 23, .22);
        color: #171a17;
        background: transparent;
        text-align: left;
        cursor: pointer;
      }

      .menu-row:nth-child(2) { --accent: #b8c98c; }
      .menu-row:nth-child(3) { --accent: #e27150; border-bottom: 0; }

      .row-static,
      .row-flow {
        position: absolute;
        inset: 0;
      }

      .row-static {
        display: grid;
        grid-template-columns: 25px minmax(0, 1fr) auto 17px;
        align-items: center;
        gap: 7px;
        padding: 0 9px;
        opacity: .42;
        transition: opacity .18s ease, transform .18s ease;
      }

      .menu-row:hover .row-static,
      .menu-row:focus-visible .row-static { opacity: .72; }

      .row-index {
        color: rgba(23, 26, 23, .56);
        font: 800 6px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .08em;
      }

      .row-title {
        overflow: hidden;
        font: 870 17px/.9 system-ui, sans-serif;
        letter-spacing: -.06em;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .row-meta {
        color: rgba(23, 26, 23, .64);
        font: 750 5px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .1em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .row-arrow {
        font: 700 12px/1 system-ui, sans-serif;
        transform: translateX(-2px);
      }

      .row-flow {
        overflow: hidden;
        color: #171a17;
        background: var(--accent);
        opacity: 0;
        pointer-events: none;
        transform: translateY(100%);
        transition: opacity .18s ease, transform .24s cubic-bezier(.22, .72, .2, 1);
      }

      .menu-row.active .row-static {
        opacity: 0;
        transform: translateY(-76%);
      }

      .menu-row.active .row-flow {
        opacity: 1;
        transform: translateY(0);
      }

      .row-rail {
        display: flex;
        width: max-content;
        height: 100%;
        will-change: transform;
      }

      .rail-unit {
        position: relative;
        flex: 0 0 152px;
        display: grid;
        grid-template-columns: 58px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
        height: 100%;
        padding: 4px 10px 4px 0;
      }

      .rail-unit::after {
        content: "✦";
        position: absolute;
        right: 2px;
        top: 50%;
        font-size: 5px;
        transform: translateY(-50%);
      }

      .rail-unit img {
        display: block;
        width: 58px;
        height: 100%;
        min-height: 34px;
        object-fit: cover;
        box-shadow: inset 0 0 0 1px rgba(23, 26, 23, .18);
      }

      .menu-row[data-index="0"] img { object-position: 66% center; }
      .menu-row[data-index="1"] img { object-position: 50% center; }
      .menu-row[data-index="2"] img { object-position: 59% center; }

      .rail-copy {
        display: block;
        min-width: 0;
      }

      .rail-copy strong {
        display: block;
        overflow: hidden;
        font: 900 11px/.9 system-ui, sans-serif;
        letter-spacing: -.05em;
        text-overflow: clip;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .rail-copy small {
        display: block;
        margin-top: 4px;
        overflow: hidden;
        font: 800 5px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .08em;
        text-overflow: clip;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .library-badge {
        top: 8px;
        left: 10px;
        color: #202820;
        border-color: rgba(32, 40, 32, .14);
        background: rgba(248, 244, 233, .86);
      }

      .scene-caption { display: none; }

      .image-menu.is-seeking .row-static,
      .image-menu.is-seeking .row-flow,
      .image-menu.is-seeking .menu-row { transition: none; }

      @media (prefers-reduced-motion: reduce) {
        .row-static,
        .row-flow,
        .menu-row { transition: none; }
      }
    </style>
    <script type="module" crossorigin src="./assets/hover-activated-image-marquee-menu-BQzkkvhA.js"></script>

  </head>
