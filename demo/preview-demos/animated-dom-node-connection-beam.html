<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Motion — Animated DOM Node Connection Beam</title>
  <link rel="stylesheet" href="./shared.css">
  <style>
    :root{--preview-background:#08110f}
    .beam-stage{position:absolute;inset:0;background:radial-gradient(circle at 54% 52%,#183c344f,transparent 42%)}
    .beam-svg{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
    .beam-path{fill:none;stroke:#72f3c5;stroke-width:1.5;stroke-dasharray:7 9;filter:drop-shadow(0 0 4px #72f3c5)}
    .beam-node{position:absolute;z-index:3;width:42px;height:42px;border:1px solid #62ba9d;border-radius:50%;display:grid;place-items:center;background:#0d211c;color:#dcfff2;font:900 6px/1 ui-monospace;box-shadow:0 0 24px #40d8a933}
    .beam-node.a{left:112px;top:118px}
    .beam-node.b{right:29px;top:105px}
    .beam-node.hub{left:143px;top:66px;width:50px;height:50px;border-color:#ffcc75;background:#2b2011}
    .beam-copy{position:absolute;z-index:4;left:13px;top:42px;color:#e9fff7;pointer-events:none}
    .beam-copy small{font:800 6px/1 ui-monospace;letter-spacing:.16em;color:#72f3c5}
    .beam-copy h1{width:96px;margin:8px 0 0;font:950 16px/.86 system-ui;letter-spacing:-.05em}
    .library-badge{background:#08110fc9}
  </style>
</head>
<body>
  <main class="preview-stage beam-stage" id="beam-stage" data-preview-mechanism="measured-dom-anchor-beams">
    <svg class="beam-svg" viewBox="0 0 320 180"><path class="beam-path" id="beam-left"/><path class="beam-path" id="beam-right"/></svg>
    <section class="beam-copy"><small>LIVE ROUTING / DOM</small><h1>LIGHT STAYS ATTACHED TO MOVING TOOLS.</h1></section>
    <button class="beam-node a" id="beam-a">INPUT</button>
    <div class="beam-node hub" id="beam-hub">MODEL</div>
    <button class="beam-node b" id="beam-b">OUTPUT</button>
    <span class="library-badge">Motion · measured animated beams</span>
    <span class="scene-caption">DOMRect anchors recompute both Bézier paths</span>
  </main>
  <script type="module" src="./src/animated-dom-node-connection-beam-demo.js"></script>
</body>
</html>
