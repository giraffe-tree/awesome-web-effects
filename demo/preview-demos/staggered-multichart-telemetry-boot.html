<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js — Staggered Multichart Telemetry Boot</title>
    <link rel="stylesheet" href="./shared.css" />
    <style>
      :root { --preview-background: #eff0e7; color-scheme: light; }
      #telemetry-stage { position: absolute; inset: 0; cursor: crosshair; }
      #telemetry-stage canvas { width: 100% !important; height: 100% !important; }
      .telemetry-header { position: absolute; z-index: 4; left: 13px; right: 13px; top: 11px; display: flex; align-items: center; justify-content: space-between; color: #182019; pointer-events: none; }
      .telemetry-header strong { font: 900 9px/1 ui-monospace, monospace; letter-spacing: -.02em; }
      .telemetry-header span { display: inline-flex; align-items: center; gap: 5px; font: 800 6px/1 ui-monospace, monospace; letter-spacing: .12em; }
      .telemetry-header span::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: #8b8e85; box-shadow: 0 0 0 3px #8b8e8520; }
      .telemetry-header[data-online='true'] span::before { background: #1cad72; box-shadow: 0 0 0 3px #1cad7226; }
      .boot-sequence { position: absolute; z-index: 4; left: 13px; bottom: 10px; display: flex; gap: 4px; pointer-events: none; }
      .boot-sequence i { width: 15px; height: 2px; border-radius: 5px; background: #26372a24; }
      .boot-sequence i.active { background: #26372a; }
      .preview-stage > .library-badge { left: auto; right: 11px; top: auto; bottom: 8px; color: #29342b; background: #f6f5e9d9; border-color: #1d2c2220; }
      .scene-caption { color: #3440398f; }
    </style>
  </head>
  <body>
    <main class="preview-stage" aria-label="A live p5.js telemetry console whose line, bar, and radial charts boot in a staggered sequence">
      <div id="telemetry-stage" data-preview-mechanism="p5-staggered-telemetry" tabindex="0" aria-label="Click or press Enter to restart the telemetry boot sequence"></div>
      <div class="telemetry-header" id="telemetry-header"><strong>FIELD / 07</strong><span id="system-label">SYSTEM BOOT</span></div>
      <div class="boot-sequence" id="boot-sequence" aria-hidden="true"><i></i><i></i><i></i></div>
      <span class="library-badge">p5.js · staged draw</span>
      <span class="scene-caption">each instrument comes online in sequence</span>
    </main>
    <script type="module" src="./src/staggered-multichart-telemetry-boot-demo.js"></script>
  </body>
</html>
