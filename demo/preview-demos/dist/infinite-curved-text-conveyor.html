<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion — Infinite Curved Text Conveyor</title>
    <style>
      :root {
        --preview-background: #ece9df;
        --paper: #ece9df;
        --ink: #182019;
        --acid: #d7ff42;
        --signal: #f05b3c;
        --progress: 0;
      }

      button { font: inherit; }

      .route-stage {
        color: var(--ink);
        background:
          linear-gradient(90deg, rgba(24, 32, 25, .045) 1px, transparent 1px) 0 0 / 24px 100%,
          linear-gradient(rgba(24, 32, 25, .04) 1px, transparent 1px) 0 0 / 100% 24px,
          var(--paper);
        user-select: none;
      }

      .route-stage::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(circle at 82% 22%, rgba(215, 255, 66, .72), transparent 19%),
          radial-gradient(circle at 15% 84%, rgba(240, 91, 60, .16), transparent 22%);
      }

      .masthead {
        position: absolute;
        z-index: 10;
        top: 9px;
        left: 11px;
        right: 11px;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        pointer-events: none;
      }

      .brand {
        display: grid;
        gap: 2px;
      }

      .brand-kicker,
      .phase-label,
      .route-instruction,
      .route-readout,
      .route-control {
        font-size: clamp(6px, 2.2vw, 10px);
        font-weight: 900;
        letter-spacing: .13em;
        text-transform: uppercase;
      }

      .brand-kicker { color: rgba(24, 32, 25, .58); }

      .brand-title {
        font-size: clamp(10px, 4.4vw, 22px);
        font-weight: 950;
        line-height: .9;
        letter-spacing: -.055em;
      }

      .phase-label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 1px;
      }

      .phase-label::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--signal);
        box-shadow: 0 0 0 3px rgba(240, 91, 60, .13);
      }

      .route-field {
        position: absolute;
        z-index: 2;
        inset: 0;
        cursor: ew-resize;
        touch-action: none;
        outline: none;
      }

      .route-field:focus-visible::after {
        content: "";
        position: absolute;
        inset: 4px;
        border: 2px solid var(--signal);
        border-radius: 5px;
        pointer-events: none;
      }

      .route-svg {
        width: 100%;
        height: 100%;
        overflow: visible;
      }

      .route-band {
        fill: none;
        stroke: rgba(24, 32, 25, .12);
        stroke-width: 24;
        stroke-linecap: round;
      }

      .route-band--signal {
        stroke: rgba(240, 91, 60, .12);
        stroke-width: 19;
      }

      .route-rail {
        fill: none;
        stroke: rgba(24, 32, 25, .7);
        stroke-width: .85;
        stroke-dasharray: 2 5;
      }

      .route-rail--signal { stroke: rgba(240, 91, 60, .86); }

      .route-copy {
        fill: var(--ink);
        font-size: 14px;
        font-weight: 950;
        letter-spacing: .045em;
        text-transform: uppercase;
      }

      .route-copy--signal {
        fill: var(--signal);
        font-size: 9.5px;
        letter-spacing: .085em;
      }

      .stop-dot {
        fill: var(--acid);
        stroke: var(--ink);
        stroke-width: 1.5;
      }

      .stop-index {
        fill: var(--ink);
        font-size: 4.4px;
        font-weight: 950;
        letter-spacing: .08em;
      }

      .route-instruction {
        position: absolute;
        z-index: 6;
        top: 43px;
        left: 50%;
        display: flex;
        align-items: center;
        gap: 7px;
        transform: translateX(-50%);
        padding: 5px 8px;
        border: 1px solid rgba(24, 32, 25, .18);
        border-radius: 999px;
        background: rgba(236, 233, 223, .83);
        backdrop-filter: blur(8px);
        white-space: nowrap;
        pointer-events: none;
      }

      .route-instruction::before,
      .route-instruction::after {
        content: "";
        width: 12px;
        height: 1px;
        background: currentColor;
      }

      .route-stage[data-engaged="true"] .route-instruction {
        color: var(--signal);
      }

      .control-deck {
        position: absolute;
        z-index: 12;
        right: 9px;
        bottom: 8px;
        left: 9px;
        display: grid;
        grid-template-columns: auto minmax(72px, 1fr) auto auto;
        align-items: center;
        gap: 7px;
        min-height: 27px;
        padding: 5px 6px 5px 9px;
        border: 1px solid rgba(24, 32, 25, .19);
        border-radius: 4px;
        background: rgba(247, 245, 237, .9);
        box-shadow: 0 7px 24px rgba(24, 32, 25, .1);
        backdrop-filter: blur(12px);
      }

      .route-readout {
        min-width: 58px;
        color: rgba(24, 32, 25, .72);
      }

      .route-progress {
        position: relative;
        height: 12px;
        border-right: 1px solid rgba(24, 32, 25, .28);
        border-left: 1px solid rgba(24, 32, 25, .28);
      }

      .route-progress::before {
        content: "";
        position: absolute;
        top: 5px;
        right: 0;
        left: 0;
        height: 1px;
        background: rgba(24, 32, 25, .26);
      }

      .route-progress::after {
        content: "";
        position: absolute;
        top: 1px;
        left: calc(var(--progress) * 100%);
        width: 5px;
        height: 10px;
        border-radius: 1px;
        background: var(--signal);
        transform: translateX(-50%);
      }

      .route-control {
        height: 19px;
        padding: 0 7px;
        border: 1px solid rgba(24, 32, 25, .28);
        border-radius: 2px;
        background: transparent;
        color: var(--ink);
        cursor: pointer;
      }

      .route-control:hover,
      .route-control:focus-visible {
        border-color: var(--signal);
        background: var(--signal);
        color: #fff8ed;
        outline: none;
      }

      .library-badge {
        top: auto;
        bottom: 44px;
        left: 11px;
        border-color: rgba(24, 32, 25, .17);
        background: rgba(236, 233, 223, .76);
        color: rgba(24, 32, 25, .66);
      }

      .route-stage .scene-caption { display: none; }

      @media (max-width: 270px) {
        .masthead { top: 7px; left: 8px; right: 8px; }
        .phase-label span { display: none; }
        .route-instruction { top: 35px; }
        .control-deck {
          right: 6px;
          bottom: 6px;
          left: 6px;
          grid-template-columns: auto 1fr auto;
        }
        .route-control[data-direction="back"] { display: none; }
        .library-badge { bottom: 40px; left: 8px; }
      }
    </style>
    <script type="module" crossorigin src="./assets/infinite-curved-text-conveyor-N3nrc6fr.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-DRJThx9H.js">
    <link rel="modulepreload" crossorigin href="./assets/shared-CArD_xX8.js">
    <link rel="modulepreload" crossorigin href="./assets/animate-C1TGnsDs.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main
      class="preview-stage route-stage"
      id="route-stage"
      data-engaged="false"
      aria-label="Night Loop arena ribbon-board routing console"
    >
      <header class="masthead" aria-hidden="true">
        <div class="brand">
          <span class="brand-kicker">Civic signals · route 07</span>
          <strong class="brand-title">Night Loop</strong>
        </div>
        <div class="phase-label"><span id="phase-label">Waiting for route input</span></div>
      </header>

      <section
        class="route-field"
        id="route-field"
        tabindex="0"
        role="slider"
        aria-label="Route the curved arena ribbon"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
        aria-valuetext="Ribbon at origin"
        data-preview-mechanism="motion-paused-curved-text-conveyor"
      >
        <svg class="route-svg" viewBox="0 0 320 180" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Two continuous event messages following intersecting curved routes">
          <defs>
            <path id="route-upper" d="M -74 115 C 11 25 114 19 184 72 S 307 151 406 47" />
            <path id="route-lower" d="M -75 53 C 25 145 142 151 215 101 S 329 25 405 92" />
          </defs>

          <path class="route-band" d="M -74 115 C 11 25 114 19 184 72 S 307 151 406 47" />
          <path class="route-band route-band--signal" d="M -75 53 C 25 145 142 151 215 101 S 329 25 405 92" />
          <path class="route-rail" d="M -74 115 C 11 25 114 19 184 72 S 307 151 406 47" />
          <path class="route-rail route-rail--signal" d="M -75 53 C 25 145 142 151 215 101 S 329 25 405 92" />

          <g id="upper-copy" aria-hidden="true">
            <text class="route-copy"><textPath class="flow-text flow-text--upper" href="#route-upper">NIGHT LOOP · GATE 04 · PLATFORM EAST ·</textPath></text>
            <text class="route-copy"><textPath class="flow-text flow-text--upper" href="#route-upper">NIGHT LOOP · GATE 04 · PLATFORM EAST ·</textPath></text>
            <text class="route-copy"><textPath class="flow-text flow-text--upper" href="#route-upper">NIGHT LOOP · GATE 04 · PLATFORM EAST ·</textPath></text>
            <text class="route-copy"><textPath class="flow-text flow-text--upper" href="#route-upper">NIGHT LOOP · GATE 04 · PLATFORM EAST ·</textPath></text>
          </g>
          <g id="lower-copy" aria-hidden="true">
            <text class="route-copy route-copy--signal"><textPath class="flow-text flow-text--lower" href="#route-lower">LAST ENTRY 23:40 · VIA RIVER WALK ·</textPath></text>
            <text class="route-copy route-copy--signal"><textPath class="flow-text flow-text--lower" href="#route-lower">LAST ENTRY 23:40 · VIA RIVER WALK ·</textPath></text>
            <text class="route-copy route-copy--signal"><textPath class="flow-text flow-text--lower" href="#route-lower">LAST ENTRY 23:40 · VIA RIVER WALK ·</textPath></text>
            <text class="route-copy route-copy--signal"><textPath class="flow-text flow-text--lower" href="#route-lower">LAST ENTRY 23:40 · VIA RIVER WALK ·</textPath></text>
          </g>

          <g aria-hidden="true">
            <circle class="stop-dot" cx="72" cy="52" r="6" />
            <text class="stop-index" x="72" y="54" text-anchor="middle">04</text>
            <circle class="stop-dot" cx="259" cy="126" r="6" />
            <text class="stop-index" x="259" y="128" text-anchor="middle">E</text>
          </g>
        </svg>
        <span class="route-instruction" id="route-instruction">Drag the ribbon</span>
      </section>

      <div class="control-deck" aria-label="Ribbon routing controls">
        <output class="route-readout" id="route-readout" aria-live="polite">Route 00%</output>
        <span class="route-progress" aria-hidden="true"></span>
        <button class="route-control" data-direction="back" type="button" aria-label="Move ribbon backward">− Back</button>
        <button class="route-control" data-direction="forward" type="button" aria-label="Move ribbon forward">Next +</button>
      </div>

      <span class="library-badge">Motion · SVG text paths</span>
      <span class="scene-caption">Drag to route repeated arena messages along two authored curves</span>
    </main>
  </body>
</html>
