<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime.js — Staggered Transform Choreography</title>
    <style>
      :root { --preview-background: #0c1020; }
      .preview-stage { background: radial-gradient(circle at 70% 45%, #2d2364 0, #141a35 35%, #0c1020 72%); }
      .motion-lane { position: absolute; inset: 42px 18px 20px; overflow: hidden; border: 1px solid #ffffff18; border-radius: 18px; background: linear-gradient(110deg, #ffffff0b, #ffffff03); box-shadow: inset 0 0 30px #0005; }
      .motion-lane::before { content: ''; position: absolute; top: 13px; bottom: 13px; left: 34px; width: 1px; background: #7df2ff55; box-shadow: 216px 0 0 #ff79b955; }
      .motion-lane::after { content: 'STAGGER  ·  72 MS'; position: absolute; right: 12px; top: 9px; color: #ffffff61; font: 800 7px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .12em; }
      .guide-line { position: absolute; left: 35px; right: 35px; top: 70px; height: 1px; background: linear-gradient(90deg, #7df2ff4d, #8d78ff82, #ff79b94d); }
      .guide-line::before, .guide-line::after { content: ''; position: absolute; top: -3px; width: 7px; height: 7px; border: 1px solid #fff7; border-radius: 50%; background: #11172c; }
      .guide-line::before { left: -3px; }
      .guide-line::after { right: -3px; }
      .choreo-node { position: absolute; z-index: 2; left: 26px; top: calc(14px + var(--i) * 10px); display: grid; width: 20px; height: 20px; place-items: center; border: 1px solid #ffffff80; border-radius: 6px; background: var(--color); color: #0a1020; box-shadow: 0 6px 16px #0007, 0 0 13px color-mix(in srgb, var(--color) 62%, transparent); font: 900 7px/1 ui-monospace, SFMono-Regular, Menlo, monospace; transform-origin: 50% 50%; will-change: transform, opacity; }
      .node-1, .node-5 { --color: #74f5ed; }
      .node-2, .node-6 { --color: #a891ff; }
      .node-3, .node-7 { --color: #ff83bd; }
      .node-4, .node-8 { --color: #ffd56f; }
      .library-badge { border-color: #b7a8ff4a; background: #10162bd9; }
      .scene-caption { color: #c7c3e0; }
    </style>
    <script type="module" crossorigin src="./assets/staggered-transform-choreography-BEPbUbpf.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-C4iZKo3w.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage" aria-label="A real Anime.js stagger sequence choreographing transforms across eight tiles">
      <section class="motion-lane" data-preview-mechanism="animejs-stagger">
        <div class="guide-line" aria-hidden="true"></div>
        <span class="choreo-node node-1" style="--i: 0">01</span>
        <span class="choreo-node node-2" style="--i: 1">02</span>
        <span class="choreo-node node-3" style="--i: 2">03</span>
        <span class="choreo-node node-4" style="--i: 3">04</span>
        <span class="choreo-node node-5" style="--i: 4">05</span>
        <span class="choreo-node node-6" style="--i: 5">06</span>
        <span class="choreo-node node-7" style="--i: 6">07</span>
        <span class="choreo-node node-8" style="--i: 7">08</span>
      </section>
      <span class="library-badge">Anime.js · transform stagger</span>
      <span class="scene-caption">one transform, offset across the whole group</span>
    </main>
  </body>
</html>
