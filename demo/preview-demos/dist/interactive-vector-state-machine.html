<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Motion — Interactive Vector State Machine</title>
    <style>
      :root { --preview-background: #f0eddf; color-scheme: light; }
      .vector-console { position: absolute; inset: 0; display: grid; grid-template-columns: 126px 1fr; align-items: center; padding: 34px 17px 20px; color: #20241e; cursor: pointer; }
      .vector-console:focus-visible { outline: 2px solid #4867ff; outline-offset: -5px; }
      .vector-stage { position: relative; width: 118px; height: 118px; }
      .vector-stage svg { display: block; width: 100%; height: 100%; overflow: visible; }
      .vector-copy { padding-left: 17px; }
      .state-kicker { margin: 0 0 6px; color: #657064; font: 800 6px/1 ui-monospace, monospace; letter-spacing: .14em; text-transform: uppercase; }
      .state-name { margin: 0; font: 950 22px/.85 system-ui, sans-serif; letter-spacing: -.065em; text-transform: uppercase; }
      .state-description { max-width: 135px; margin: 9px 0 0; color: #596158; font: 650 7px/1.45 system-ui, sans-serif; }
      .state-rail { display: flex; gap: 4px; margin-top: 11px; }
      .state-rail i { width: 25px; height: 3px; border-radius: 9px; background: #252a2420; }
      .state-rail i.active { background: var(--state-color, #4867ff); }
      .machine-core { transform-box: fill-box; transform-origin: center; }
      .machine-orbit, .response-rays { transform-box: view-box; transform-origin: center; }
      .response-rays { opacity: 0; }
      .library-badge { color: #273026; background: #f7f3e8d9; border-color: #252b241c; }
      .scene-caption { left: auto; right: 12px; color: #48504783; }
    </style>
    <script type="module" crossorigin src="./assets/interactive-vector-state-machine-CTCQrtvb.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-DJbJzhDe.js">
    <link rel="modulepreload" crossorigin href="./assets/animate-C1TGnsDs.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage">
      <div class="vector-console" id="vector-console" data-preview-mechanism="motion-vector-state-machine" role="button" tabindex="0" aria-label="Cycle the vector agent through idle, listening, and responding states">
        <div class="vector-stage">
          <svg viewBox="0 0 120 120" role="img" aria-label="An animated vector agent changing state">
            <defs>
              <radialGradient id="core-gradient"><stop offset="0" stop-color="#fff"/><stop offset=".35" stop-color="#c6ff86"/><stop offset="1" stop-color="#4f6cff"/></radialGradient>
            </defs>
            <g class="machine-orbit" id="machine-orbit" fill="none" stroke="#53645a" stroke-width="1">
              <circle cx="60" cy="60" r="45" stroke-dasharray="3 8" opacity=".36"/>
              <path d="M18 58c8-32 34-46 62-38" stroke="#4f6cff" stroke-width="2.2" stroke-linecap="round"/>
              <circle cx="82" cy="21" r="3" fill="#4f6cff" stroke="none"/>
            </g>
            <g class="response-rays" id="response-rays" fill="none" stroke="#ff6b52" stroke-width="2" stroke-linecap="round">
              <path d="M60 5v10M60 105v10M5 60h10M105 60h10M21 21l7 7M92 92l7 7M99 21l-7 7M28 92l-7 7"/>
            </g>
            <g class="machine-core" id="machine-core">
              <path id="core-shape" d="M60 28C79 28 94 42 94 60S79 92 60 92 26 78 26 60 41 28 60 28Z" fill="url(#core-gradient)" stroke="#26342d" stroke-width="1.2"/>
              <path id="state-glyph" d="M44 61c7-11 25-11 32 0-7 11-25 11-32 0Z" fill="#16221b"/>
              <circle cx="60" cy="61" r="5" fill="#f2ffe1"/>
            </g>
          </svg>
        </div>
        <section class="vector-copy">
          <p class="state-kicker">Agent vector / state 01–03</p>
          <h1 class="state-name" id="state-name">Idle</h1>
          <p class="state-description" id="state-description">A calm orbit keeps the agent available without demanding attention.</p>
          <div class="state-rail" aria-hidden="true"><i></i><i></i><i></i></div>
        </section>
      </div>
      <span class="library-badge">Motion · SVG FSM</span>
      <span class="scene-caption">click / Enter to advance state</span>
    </main>
  </body>
</html>
