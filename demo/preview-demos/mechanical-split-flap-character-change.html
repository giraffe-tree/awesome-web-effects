<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Motion — Mechanical Split-flap Character Change</title><link rel="stylesheet" href="./shared.css"/><style>
:root{--preview-background:#0f1112}.flap-stage{background:radial-gradient(circle at 50% 55%,#4e4b3948,transparent 45%),linear-gradient(145deg,#0b0c0d,#1b1d1e);color:#fff}.flap-copy{position:absolute;left:16px;top:44px;font:900 15px/.9 Georgia,serif;letter-spacing:-.045em}.flap-copy small{display:block;margin-top:6px;color:#8e918f;font:800 6px/1 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase}.flap-board{position:absolute;left:16px;right:16px;top:82px;display:grid;grid-template-columns:repeat(6,1fr);gap:4px;perspective:600px}.flap{position:relative;height:47px;border:1px solid #ffffff1d;border-radius:5px;background:#282b2b;box-shadow:0 4px 0 #080909;transform-style:preserve-3d;overflow:hidden}.flap::after{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:#050606;box-shadow:0 1px #ffffff12}.flap-letter{display:grid;place-items:center;width:100%;height:100%;font:950 25px/1 ui-monospace,monospace}.flap-hinge{position:absolute;inset:0;background:#333736;transform-origin:center;backface-visibility:hidden;display:grid;place-items:center;font:950 25px/1 ui-monospace,monospace;clip-path:inset(0 0 50% 0)}.flap-button{position:absolute;right:17px;bottom:17px;height:22px;padding:0 8px;border:1px solid #ffffff2f;border-radius:99px;background:#222626;color:#fff;font:900 6px/1 ui-monospace,monospace;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}.scene-caption{display:none}
</style></head><body><main class="preview-stage flap-stage"><div class="flap-copy">A WORD WITH<br/>MECHANICAL MEMORY<small>six independent split flaps</small></div><div class="flap-board" id="flap-board"></div><button class="flap-button" id="flap-button" type="button">Flip word</button><span class="library-badge">Motion · split-flap display</span><span class="scene-caption">characters change through hinged display geometry, not a fade</span></main><script type="module" src="./src/mechanical-split-flap-character-change-demo.js"></script></body></html>
