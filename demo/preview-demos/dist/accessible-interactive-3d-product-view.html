<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>model-viewer — Accessible Interactive 3D Product View</title>
    <style>
      :root { --preview-background: radial-gradient(circle at 70% 25%, #eff8ff 0, #dce9f2 45%, #bccbd8 100%); }
      model-viewer { width: 100%; height: 100%; --poster-color: transparent; --progress-bar-color: #2563eb; }
      .product-copy { position: absolute; z-index: 12; left: 12px; bottom: 11px; width: 112px; color: #13263a; pointer-events: none; }
      .product-copy strong { display: block; font-size: 11px; }
      .product-copy small { display: block; margin-top: 2px; font-size: 7px; color: #3e5b74; }
      .orbit-hint { position: absolute; z-index: 12; right: 12px; bottom: 12px; color: #214b70; font-size: 8px; font-weight: 800; }
      .library-badge { color: #15334f; background: rgba(255,255,255,.65); border-color: rgba(18,50,78,.15); }
    </style>
    <script type="module" crossorigin src="./assets/accessible-interactive-3d-product-view-BIeqK64d.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-elT6vGV-.js">
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-QTnfLwEv.js">
    <link rel="modulepreload" crossorigin href="./assets/three.module-BFUsT0ak.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage" aria-label="An accessible, orbitable 3D astronaut product shown with model-viewer">
      <model-viewer
        id="product-viewer"
        alt="A 3D astronaut that can be rotated and zoomed"
        camera-controls
        interaction-prompt="none"
        interpolation-decay="0"
        shadow-intensity="1.15"
        shadow-softness=".75"
        exposure="1.05"
        environment-image="neutral"
        camera-orbit="25deg 72deg 156%">
      </model-viewer>
      <span class="library-badge">&lt;model-viewer&gt; · accessible</span>
      <div class="product-copy"><strong>ORBITABLE 3D</strong><small>drag · zoom · keyboard</small></div>
      <div class="orbit-hint" aria-hidden="true">↔ 360°</div>
    </main>
  </body>
</html>
