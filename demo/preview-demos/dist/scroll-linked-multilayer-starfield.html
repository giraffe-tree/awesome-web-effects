    <title>p5.js — Scroll-linked Multilayer Starfield</title>
    <style>
      :root { --preview-background: #020712; }

      .depth-label { position: absolute; z-index: 6; right: 20px; top: 47px; color: #d8eaff80; font: 700 6px/1.3 ui-monospace, monospace; letter-spacing: .12em; text-align: right; }
      .depth-label span { display: block; margin-bottom: 28px; }
      .starfield-title { position: absolute; z-index: 4; left: 18px; top: 54px; width: 145px; margin: 0; color: #eef7ff; font: 800 20px/.9 ui-serif, Georgia, serif; letter-spacing: -.045em; text-shadow: 0 4px 22px #020712; }
      .starfield-title small { display: block; margin-top: 8px; color: #93b5d7; font: 700 7px/1.4 ui-monospace, monospace; letter-spacing: .1em; text-transform: uppercase; }
      .library-badge { background: #030817c9; }
