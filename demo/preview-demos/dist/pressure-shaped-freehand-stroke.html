<body>
  <main id="proof-stage" class="preview-stage" data-preview-mechanism="trusted-pressure-samples-to-variable-width-p5-outline">
    <div id="pressure-host" tabindex="0" role="application" aria-label="Packaging proof annotation surface. Draw with pressure, use the visible pressure control for a mouse, use arrow keys to move, brackets to change pressure, Space to lower or lift the keyboard pen, Enter to confirm, Z to undo, and R to reset."></div>
    <header class="proof-header"><span>Carton Dieline / Proof 04</span><span>p5.js · pressure geometry</span></header>
    <section class="proof-copy"><small>STRUCTURAL REVIEW</small><h1>MAKE THE CONCERN CARRY WEIGHT.</h1><p>Use a light note and a firm mark. Pen pressure—or this explicit mouse control—shapes the ink.</p></section>
    <section class="pressure-panel" aria-label="Explicit pressure control for mouse and keyboard input">
      <label for="pressure-control"><span>INK PRESSURE</span><output id="pressure-value">35%</output></label>
      <input id="pressure-control" type="range" min="10" max="100" step="5" value="35" aria-label="Annotation pressure">
      <span id="pressure-source" class="pressure-source">MANUAL INPUT</span>
    </section>
    <span id="proof-status" class="proof-status" data-retained="false"><small>REVIEW STATE</small><output id="status-output">AWAITING HUMAN MARK</output></span>
    <footer class="proof-controls">
      <span class="keyboard-hint">ARROWS DRAW · [ ] PRESSURE · SPACE PEN</span>
      <button id="undo-stroke" class="proof-action" type="button" disabled>UNDO</button>
      <button id="reset-proof" class="proof-action" type="button" disabled>RESET</button>
      <button id="confirm-proof" class="proof-action confirm" type="button">CONFIRM</button>
    </footer>
  </main>
