<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Chromatic Channel Drag Portrait</title>
    <link rel="stylesheet" href="./shared.css">
    <style>
      :root { --preview-background: #0c0a0e; }
      .preview-stage { background: #0c0a0e; }
      #channel-canvas { position: absolute; inset: 0; width: 100%; height: 100%; cursor: ew-resize; touch-action: none; outline: none; }
      #channel-canvas:focus-visible { outline: 2px solid #f8eee8; outline-offset: -5px; }
      .copy { position: absolute; z-index: 5; left: 4.375%; top: 27.2%; width: 40%; color: #fff7f3; pointer-events: none; }
      .copy small { display: block; color: #ff6c88; font: 850 clamp(6px,1.875vw,13px)/1 ui-monospace, monospace; letter-spacing: .14em; }
      .copy h1 { margin: clamp(8px,2.5vw,18px) 0 0; font: 950 clamp(20px,6.25vw,45px)/.84 system-ui, sans-serif; letter-spacing: -.06em; }
      .interaction-hint { position: absolute; z-index: 5; left: 4.375%; bottom: 8.3%; margin: 0; color: rgba(255,247,243,.58); font: 800 clamp(6px,1.875vw,13px)/1 ui-monospace, monospace; letter-spacing: .1em; pointer-events: none; }
      .channels { position: absolute; z-index: 6; right: 5.3%; bottom: 8.3%; display: flex; align-items: center; gap: clamp(4px,1.25vw,9px); color: rgba(255,255,255,.72); font: 850 clamp(6px,1.875vw,13px)/1 ui-monospace, monospace; letter-spacing: .08em; pointer-events: none; }
      .channels b:nth-child(1) { color: #ff315d; }
      .channels b:nth-child(2) { color: #51f0cf; }
      .channels b:nth-child(3) { color: #6f7cff; }
      .shift-readout { min-width: 3.8em; color: white; text-align: right; }
      .library-badge { color: #fff; background: rgba(12,10,14,.72); border-color: rgba(255,255,255,.18); }
      .scene-caption { display: none; }
      .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    </style>
  </head>
  <body>
    <main class="preview-stage" data-preview-mechanism="p5-raster-rgb-channel-drag">
      <canvas
        id="channel-canvas"
        tabindex="0"
        role="slider"
        aria-label="RGB portrait channel separation"
        aria-describedby="channel-instructions"
        aria-valuemin="-18"
        aria-valuemax="18"
        aria-valuenow="0"
        aria-valuetext="Channels registered"
      ></canvas>
      <section class="copy">
        <small>RGB REGISTRATION / 01</small>
        <h1>PULL<br>COLOR<br>APART.</h1>
      </section>
      <p class="interaction-hint" aria-hidden="true">DRAG · RELEASE TO ALIGN</p>
      <p class="sr-only" id="channel-instructions">Drag left or right, use the left and right arrow keys, then release to align the portrait channels.</p>
      <output class="channels" id="channel-readout" aria-live="polite">
        <b>R</b><span>·</span><b>G</b><span>·</span><b>B</b><span class="shift-readout" id="shift-readout">0 PX</span>
      </output>
      <span class="library-badge">p5.js · raster RGB drag</span>
      <span class="scene-caption">real portrait pixels → split channels → spring registration</span>
    </main>
    <script type="module" src="./src/chromatic-channel-drag-portrait-demo.js"></script>
  </body>
</html>
