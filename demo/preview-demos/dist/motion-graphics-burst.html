<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mo.js — Motion-graphics Burst</title>
    <style>
      :root { --preview-background: #11101b; }
      .burst-stage { background: radial-gradient(circle at 50% 52%, #302b4d 0, #171525 36%, #0d0c15 75%); }
      .burst-stage::before { content: ''; position: absolute; inset: 0; opacity: .22; background-image: linear-gradient(#9a91bd20 1px, transparent 1px), linear-gradient(90deg, #9a91bd20 1px, transparent 1px); background-size: 20px 20px; mask-image: radial-gradient(circle, #000, transparent 72%); }
      .burst-stage::after { content: ''; position: absolute; left: 50%; top: 50%; width: 122px; height: 122px; border: 1px solid #bdb5e222; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 45px #735cff1f inset; }
      .burst-field { position: absolute; z-index: 3; inset: 0; overflow: hidden; }
      .burst-reticle { position: absolute; z-index: 2; left: 50%; top: 50%; width: 28px; height: 28px; border: 1px solid #fff5; border-radius: 50%; transform: translate(-50%, -50%); }
      .burst-reticle::before,
      .burst-reticle::after { content: ''; position: absolute; background: #fff6; }
      .burst-reticle::before { left: 13px; top: -9px; width: 1px; height: 46px; }
      .burst-reticle::after { left: -9px; top: 13px; width: 46px; height: 1px; }
      .burst-index { position: absolute; z-index: 6; right: 12px; top: 11px; color: #eeeafd; font: 800 7px/1.2 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .16em; text-align: right; text-transform: uppercase; }
      .burst-index strong { display: block; margin-top: 3px; color: #ffbd5b; font-size: 9px; letter-spacing: .08em; }
      .energy-meter { position: absolute; z-index: 6; left: 12px; right: 12px; bottom: 23px; height: 2px; overflow: hidden; background: #ffffff20; }
      .energy-meter span { display: block; width: 100%; height: 100%; background: linear-gradient(90deg, #75f4d4, #ffbd5b, #ff5d8f); box-shadow: 0 0 10px #ff8d8f; transform: scaleX(0); transform-origin: left; }
      .library-badge { background: #171525d9; }
      .scene-caption { bottom: 8px; }
    </style>
    <script type="module" crossorigin src="./assets/motion-graphics-burst-20vuQm0O.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-CNC7AqOf.js">
    <link rel="modulepreload" crossorigin href="./assets/shared-C4iZKo3w.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage burst-stage" aria-label="A deterministic radial motion-graphics burst rendered by Mo.js">
      <div class="burst-field" id="burst-field" data-preview-mechanism="mojs-burst"></div>
      <span class="burst-reticle" aria-hidden="true"></span>
      <span class="burst-index">Radial event<strong id="burst-phase">Charge</strong></span>
      <div class="energy-meter" aria-hidden="true"><span id="energy-meter-fill"></span></div>
      <span class="library-badge">Mo.js · Burst</span>
      <span class="scene-caption">one impulse · layered radial choreography</span>
    </main>
  </body>
</html>
