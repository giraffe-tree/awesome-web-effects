<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p5.js — Scroll-linked Observatory Field Guide</title>
    <style>
      :root {
        --preview-background: #030711;
        --ink: #edf5ff;
        --muted: #8aa0b8;
        --cyan: #81dbe6;
        --signal: #ef8364;
        --line: rgba(210, 229, 244, .14);
        color-scheme: dark;
      }

      button { font: inherit; color: inherit; }

      .observatory-stage {
        background:
          radial-gradient(circle at 73% 34%, rgba(54, 91, 142, .16), transparent 34%),
          linear-gradient(145deg, #071020, #02050c);
      }

      .observatory-shell {
        position: absolute;
        inset: clamp(5px, 2.4vw, 18px);
        display: grid;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(195, 218, 236, .18);
        border-radius: clamp(6px, 2.2vw, 18px);
        background: #050b16;
        box-shadow: 0 24px 70px rgba(0, 0, 0, .36);
        grid-template-rows: clamp(28px, 10vh, 42px) minmax(0, 1fr) clamp(58px, 19vh, 74px);
      }

      .observatory-header {
        display: flex;
        min-width: 0;
        align-items: center;
        justify-content: space-between;
        padding: 0 clamp(9px, 2.4vw, 19px);
        border-bottom: 1px solid var(--line);
        background: rgba(3, 8, 17, .82);
      }

      .observatory-title,
      .observatory-meta {
        display: flex;
        min-width: 0;
        align-items: center;
        gap: clamp(5px, 1.2vw, 9px);
      }

      .north-mark {
        position: relative;
        width: clamp(7px, 1.25vw, 10px);
        height: clamp(7px, 1.25vw, 10px);
        flex: 0 0 auto;
        border: 1px solid var(--cyan);
        border-radius: 50%;
      }

      .north-mark::before,
      .north-mark::after {
        position: absolute;
        background: var(--cyan);
        content: '';
      }

      .north-mark::before { top: -3px; bottom: -3px; left: 50%; width: 1px; }
      .north-mark::after { top: 50%; right: -3px; left: -3px; height: 1px; }

      .observatory-title strong,
      .observatory-meta strong {
        overflow: hidden;
        color: var(--ink);
        font-size: clamp(7px, 1.5vw, 12px);
        letter-spacing: -.02em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .observatory-title span,
      .observatory-meta span {
        color: var(--muted);
        font: 700 clamp(4px, .86vw, 7px)/1 ui-monospace, SFMono-Regular, Menlo, monospace;
        letter-spacing: .12em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .sky-viewport {
        position: relative;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        cursor: ns-resize;
        touch-action: none;
      }

      .sky-viewport:focus-within {
        outline: 2px solid var(--cyan);
        outline-offset: -2px;
      }

      #starfield-stage,
      #starfield-stage canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100% !important;
        height: 100% !important;
      }

      #starfield-stage canvas {
        outline: 0;
        touch-action: none;
      }

      .sky-grid {
        position: absolute;
        z-index: 2;
        inset: 0;
        opacity: .14;
        background-image:
          linear-gradient(rgba(154, 193, 220, .22) 1px, transparent 1px),
          linear-gradient(90deg, rgba(154, 193, 220, .22) 1px, transparent 1px);
        background-size: clamp(20px, 6vw, 48px) clamp(20px, 6vw, 48px);
        pointer-events: none;
      }

      .chapter-card {
        position: absolute;
        z-index: 4;
        top: 13%;
        left: clamp(12px, 3.2vw, 26px);
        width: clamp(174px, 34vw, 248px);
        padding: clamp(10px, 2.2vw, 18px);
        border: 1px solid rgba(197, 222, 239, .17);
        border-radius: clamp(6px, 1.5vw, 12px);
        background: rgba(3, 9, 19, .72);
        box-shadow: 0 16px 40px rgba(0, 0, 0, .22);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }

      .chapter-kicker,
      .chapter-index,
      .target-label,
      .depth-legend span,
      .progress-label,
      .input-hint,
      .depth-value {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        text-transform: uppercase;
      }

      .chapter-kicker {
        color: var(--signal);
        font-size: clamp(4px, .86vw, 7px);
        font-weight: 800;
        letter-spacing: .14em;
      }

      .chapter-card h1 {
        margin: clamp(6px, 1.2vw, 10px) 0 0;
        color: var(--ink);
        font: 820 clamp(18px, 4.3vw, 34px)/.88 ui-serif, Georgia, serif;
        letter-spacing: -.055em;
      }

      .chapter-task {
        max-width: 29em;
        margin: clamp(7px, 1.4vw, 11px) 0 0;
        color: #9fb2c4;
        font-size: clamp(6px, 1vw, 8px);
        line-height: 1.4;
      }

      .chapter-index {
        position: absolute;
        top: clamp(10px, 2vw, 16px);
        right: clamp(10px, 2vw, 16px);
        color: rgba(129, 219, 230, .5);
        font-size: clamp(5px, .9vw, 7px);
        font-weight: 800;
        letter-spacing: .1em;
      }

      .target-label {
        position: absolute;
        z-index: 4;
        top: 30%;
        left: 66%;
        display: flex;
        align-items: center;
        gap: clamp(4px, .8vw, 6px);
        color: #bcd8e9;
        font-size: clamp(4px, .8vw, 6px);
        font-weight: 760;
        letter-spacing: .11em;
        pointer-events: none;
      }

      .target-label::before {
        width: clamp(5px, 1vw, 8px);
        aspect-ratio: 1;
        border: 1px solid var(--signal);
        border-radius: 50%;
        content: '';
        box-shadow: 0 0 10px rgba(239, 131, 100, .32);
      }

      .depth-legend {
        position: absolute;
        z-index: 4;
        top: 13%;
        right: clamp(12px, 3vw, 24px);
        display: grid;
        width: clamp(50px, 10vw, 74px);
        gap: clamp(7px, 1.5vw, 12px);
        pointer-events: none;
      }

      .depth-row {
        display: grid;
        grid-template-columns: 23px 1fr;
        align-items: center;
        gap: 5px;
      }

      .depth-legend span {
        color: #8297ab;
        font-size: clamp(4px, .75vw, 6px);
        font-weight: 760;
        letter-spacing: .1em;
      }

      .depth-track {
        height: 2px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(202, 225, 240, .15);
      }

      .depth-track i {
        display: block;
        width: 100%;
        height: 100%;
        border-radius: inherit;
        background: currentColor;
        box-shadow: 0 0 8px currentColor;
        transform: scaleX(var(--layer-progress, 0));
        transform-origin: left;
      }

      .depth-row:nth-child(1) { color: #7ea5c2; }
      .depth-row:nth-child(2) { color: #81dbe6; }
      .depth-row:nth-child(3) { color: #ef8364; }

      .observation-footer {
        display: grid;
        min-width: 0;
        align-items: center;
        padding: clamp(8px, 1.8vw, 14px) clamp(10px, 2.5vw, 20px);
        border-top: 1px solid var(--line);
        background: #040913;
        grid-template-columns: clamp(105px, 21vw, 152px) minmax(100px, 1fr) auto;
        gap: clamp(10px, 2vw, 17px);
      }

      .progress-copy {
        display: flex;
        min-width: 0;
        flex-direction: column;
        gap: clamp(4px, .8vw, 6px);
      }

      .progress-label {
        color: var(--signal);
        font-size: clamp(4px, .78vw, 6px);
        font-weight: 820;
        letter-spacing: .14em;
      }

      .progress-copy strong {
        overflow: hidden;
        color: var(--ink);
        font-size: clamp(7px, 1.3vw, 10px);
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .chapter-rail {
        position: relative;
        display: flex;
        min-width: 0;
        justify-content: space-between;
        align-items: center;
      }

      .chapter-rail::before,
      .chapter-rail::after {
        position: absolute;
        z-index: 0;
        right: 0;
        left: 0;
        height: 2px;
        border-radius: 999px;
        content: '';
      }

      .chapter-rail::before { background: #223143; }
      .chapter-rail::after {
        background: linear-gradient(90deg, var(--cyan), var(--signal));
        transform: scaleX(var(--progress, 0));
        transform-origin: left;
      }

      .chapter-button {
        position: relative;
        z-index: 1;
        display: grid;
        width: clamp(18px, 3.6vw, 27px);
        aspect-ratio: 1;
        place-items: center;
        padding: 0;
        border: 0;
        border-radius: 50%;
        background: #040913;
        cursor: pointer;
      }

      .chapter-button::before {
        width: clamp(6px, 1.2vw, 9px);
        aspect-ratio: 1;
        border: 1px solid #60778d;
        border-radius: 50%;
        background: #0a1321;
        content: '';
      }

      .chapter-button[aria-current="step"]::before {
        border-color: var(--signal);
        background: var(--signal);
        box-shadow: 0 0 0 4px rgba(239, 131, 100, .1), 0 0 9px rgba(239, 131, 100, .28);
      }

      .chapter-button:focus-visible {
        outline: 2px solid var(--cyan);
        outline-offset: 2px;
      }

      .footer-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: clamp(4px, .8vw, 6px);
      }

      .input-hint,
      .depth-value {
        color: #7e94a8;
        font-size: clamp(4px, .77vw, 6px);
        font-weight: 730;
        letter-spacing: .09em;
        white-space: nowrap;
      }

      .depth-value { color: var(--cyan); }

      @media (prefers-reduced-motion: reduce) {
        .depth-track i,
        .chapter-rail::after { transition: none !important; }
      }

      @media (max-width: 420px) {
        .observatory-shell {
          inset: 6px;
          grid-template-rows: 22px minmax(0, 1fr) 40px;
        }

        .observatory-header { padding: 0 7px; }
        .chapter-card { top: 9px; left: 9px; width: 128px; padding: 8px; }
        .chapter-card h1 { font-size: 14px; }
        .chapter-task { margin-top: 5px; font-size: 5px; }
        .chapter-index { top: 7px; right: 7px; font-size: 4px; }
        .depth-legend { top: 10px; right: 8px; width: 44px; gap: 6px; }
        .depth-row { grid-template-columns: 17px 1fr; gap: 3px; }
        .depth-legend span { font-size: 3px; }
        .target-label { font-size: 3px; }
        .observation-footer { padding: 5px 7px; grid-template-columns: 78px minmax(72px, 1fr) auto; gap: 8px; }
        .progress-copy { gap: 3px; }
        .progress-copy strong { font-size: 6px; }
        .chapter-button { width: 14px; }
        .chapter-button::before { width: 5px; }
        .input-hint { display: none; }
      }

      @media (max-width: 220px), (max-height: 105px) {
        .observatory-shell {
          inset: 3px;
          border-radius: 4px;
          grid-template-rows: 11px minmax(0, 1fr) 19px;
        }

        .observatory-header { padding: 0 4px; }
        .observatory-title,
        .observatory-meta { gap: 2px; }
        .north-mark { width: 3px; height: 3px; }
        .north-mark::before { top: -1px; bottom: -1px; }
        .north-mark::after { right: -1px; left: -1px; }
        .observatory-title strong,
        .observatory-meta strong { font-size: 3px; }
        .observatory-title span,
        .observatory-meta span { font-size: 1.8px; }
        .observatory-meta span { display: none; }
        .sky-grid { background-size: 12px 12px; }
        .chapter-card { top: 3px; left: 3px; width: 53px; padding: 3px; border-radius: 2px; backdrop-filter: none; }
        .chapter-kicker { font-size: 1.7px; }
        .chapter-card h1 { margin-top: 2px; font-size: 6px; }
        .chapter-task { display: none; }
        .chapter-index { top: 3px; right: 3px; font-size: 1.7px; }
        .target-label { top: 28%; left: 66%; gap: 2px; font-size: 1.6px; }
        .target-label::before { width: 3px; box-shadow: none; }
        .depth-legend { top: 4px; right: 3px; width: 22px; gap: 3px; }
        .depth-row { grid-template-columns: 7px 1fr; gap: 2px; }
        .depth-legend span { font-size: 1.5px; }
        .depth-track { height: 1px; }
        .observation-footer { padding: 2px 4px; grid-template-columns: 34px minmax(32px, 1fr) auto; gap: 4px; }
        .progress-copy { gap: 1px; }
        .progress-label { font-size: 1.6px; }
        .progress-copy strong { font-size: 2.3px; }
        .chapter-rail::before,
        .chapter-rail::after { height: 1px; }
        .chapter-button { width: 7px; }
        .chapter-button::before { width: 3px; }
        .chapter-button[aria-current="step"]::before { box-shadow: none; }
        .footer-meta { gap: 1px; }
        .depth-value { font-size: 1.8px; }
      }
    </style>
    <script type="module" crossorigin src="./assets/scroll-linked-multilayer-starfield-BI42Lrv8.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/shared-DJbJzhDe.js">
    <link rel="modulepreload" crossorigin href="./assets/rolldown-runtime-CNC7AqOf.js">
    <link rel="modulepreload" crossorigin href="./assets/app-Dj3RhBXi.js">
    <link rel="stylesheet" crossorigin href="./assets/shared-CLxYJCuH.css">
  </head>
  <body>
    <main class="preview-stage observatory-stage" id="observatory-stage" aria-label="Interactive night-sky field guide with three scroll-linked star depths">
      <section class="observatory-shell" id="observatory-shell" data-preview-mechanism="p5-scroll-starfield">
        <header class="observatory-header">
          <div class="observatory-title">
            <i class="north-mark" aria-hidden="true"></i>
            <strong>Ridge Observatory</strong>
            <span>Dark-sky field guide</span>
          </div>
          <div class="observatory-meta">
            <span>Session</span>
            <strong>October · 22:40</strong>
          </div>
        </header>

        <section class="sky-viewport" id="sky-viewport" aria-label="Scroll, drag, or use arrow keys to move through the observation chapters">
          <div id="starfield-stage"></div>
          <i class="sky-grid" aria-hidden="true"></i>
          <article class="chapter-card" aria-live="polite">
            <span class="chapter-kicker">Observation task</span>
            <span class="chapter-index" id="chapter-index">01 / 04</span>
            <h1 id="chapter-title">Set the horizon</h1>
            <p class="chapter-task" id="chapter-task">Align Polaris above the north notch before separating the stellar planes.</p>
          </article>
          <span class="target-label" id="target-label">Polaris reference</span>
          <div class="depth-legend" aria-label="Current parallax by layer">
            <div class="depth-row"><span>Far</span><i class="depth-track"><i id="far-depth"></i></i></div>
            <div class="depth-row"><span>Mid</span><i class="depth-track"><i id="mid-depth"></i></i></div>
            <div class="depth-row"><span>Near</span><i class="depth-track"><i id="near-depth"></i></i></div>
          </div>
        </section>

        <footer class="observation-footer">
          <div class="progress-copy">
            <span class="progress-label">Observation depth</span>
            <strong id="progress-title">01 · Horizon lock</strong>
          </div>
          <nav class="chapter-rail" id="chapter-rail" aria-label="Observation chapters">
            <button class="chapter-button" type="button" data-index="0" data-progress="0" aria-label="Go to chapter 1, Horizon lock" aria-current="step"></button>
            <button class="chapter-button" type="button" data-index="1" data-progress="0.333333" aria-label="Go to chapter 2, Milky Way veil" aria-current="false"></button>
            <button class="chapter-button" type="button" data-index="2" data-progress="0.666667" aria-label="Go to chapter 3, Double Cluster" aria-current="false"></button>
            <button class="chapter-button" type="button" data-index="3" data-progress="1" aria-label="Go to chapter 4, Near pass" aria-current="false"></button>
          </nav>
          <div class="footer-meta">
            <span class="input-hint">Wheel · drag upward · arrows / page</span>
            <span class="depth-value" id="depth-value">Depth 000%</span>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>
