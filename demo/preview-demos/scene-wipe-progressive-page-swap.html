<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Motion — Scene Wipe Progressive Page Swap</title><link rel="stylesheet" href="./shared.css"><style>
:root{--preview-background:#17131c}.wipe-stage{position:absolute;inset:0;overflow:hidden;cursor:pointer}.wipe-scene{position:absolute;inset:0;padding:52px 20px 24px}.scene-night{color:#f5edff;background:radial-gradient(circle at 77% 58%,#4d2c82 0 8%,transparent 9%),linear-gradient(145deg,#17131c,#29203c)}.scene-day{color:#1c211c;background:radial-gradient(circle at 78% 59%,#f44935 0 10%,transparent 11%),#f6db75;clip-path:circle(0% at 78% 58%)}.wipe-scene small{font:800 6px/1 ui-monospace,monospace;letter-spacing:.14em}.wipe-scene h1{width:205px;margin:14px 0 0;font:950 27px/.82 system-ui;letter-spacing:-.065em}.wipe-scene p{width:145px;margin:10px 0 0;font:650 7px/1.4 system-ui;opacity:.68}.sun-grid{position:absolute;right:26px;top:54px;width:83px;height:83px;border:1px solid currentColor;border-radius:50%;opacity:.35;box-shadow:inset 0 0 0 13px transparent,inset 0 0 0 14px currentColor}.wipe-progress{position:absolute;z-index:5;left:20px;right:20px;bottom:15px;height:2px;background:#fff3}.wipe-progress i{display:block;width:100%;height:100%;background:white;transform:scaleX(0);transform-origin:left}.library-badge{background:#15111bbd}</style></head><body><main class="preview-stage"><div class="wipe-stage" id="wipe-stage" data-preview-mechanism="motion-scene-wipe" role="button" tabindex="0" aria-label="Click or press Enter to swap scenes with a progressive wipe"><section class="wipe-scene scene-night"><small>SCENE / AFTER HOURS</small><h1>Night holds the question.</h1><p>A circular reveal carries every page layer into a brighter answer.</p><span class="sun-grid"></span></section><section class="wipe-scene scene-day" id="day-scene"><small>SCENE / FIRST LIGHT</small><h1>Day reveals the system.</h1><p>One moving boundary swaps color, type, image, and atmosphere together.</p><span class="sun-grid"></span></section><div class="wipe-progress"><i id="wipe-progress"></i></div></div><span class="library-badge">Motion · clip wipe</span><span class="scene-caption">one boundary replaces the whole scene</span></main><script type="module" src="./src/scene-wipe-progressive-page-swap-demo.js"></script></body></html>
