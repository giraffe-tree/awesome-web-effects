<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>p5.js — BlurHash to Photo Progressive Reveal</title>
    <link rel="stylesheet" href="./shared.css">
    <style>
      :root { --preview-background: #e9e4da; color-scheme: light; }
      #blurhash-host { position: absolute; inset: 0; }
      #blurhash-host canvas { width: 100% !important; height: 100% !important; }
      .stay-copy { position: absolute; z-index: 5; left: 13px; top: 48px; width: 79px; color: #18272b; pointer-events: none; }
      .stay-copy small { display: block; color: #8f593f; font: 850 6px/1 ui-monospace, monospace; letter-spacing: .15em; }
      .stay-copy h1 { margin: 8px 0 0; font: 950 20px/.84 system-ui, sans-serif; letter-spacing: -.06em; }
      .stay-dates { margin: 12px 0 0; color: #455154; font: 750 6px/1.35 ui-monospace, monospace; letter-spacing: .09em; text-transform: uppercase; }
      .photo-frame { position: absolute; z-index: 4; left: 100px; right: 11px; top: 22px; bottom: 14px; overflow: hidden; border: 1px solid rgba(255,255,255,.46); border-radius: 13px; box-shadow: 0 14px 28px rgba(46,45,38,.18); pointer-events: none; }
      .photo-frame::after { content: ''; position: absolute; inset: 44% 0 0; background: linear-gradient(180deg, transparent, rgba(10,22,28,.72)); }
      .stay-meta { position: absolute; z-index: 2; left: 11px; right: 11px; bottom: 10px; display: flex; align-items: end; justify-content: space-between; gap: 8px; color: white; }
      .stay-meta small { display: block; margin-bottom: 3px; color: rgba(255,255,255,.72); font: 750 6px/1 ui-monospace, monospace; letter-spacing: .12em; text-transform: uppercase; }
      .stay-meta strong { display: block; font: 850 12px/1 system-ui, sans-serif; letter-spacing: -.035em; }
      .stay-price { flex: none; text-align: right; font: 800 7px/1.25 ui-monospace, monospace; letter-spacing: .04em; }
      .decode-state { position: absolute; z-index: 7; top: 31px; right: 19px; padding: 5px 7px; border: 1px solid rgba(255,255,255,.42); border-radius: 999px; color: white; background: rgba(15,29,34,.42); backdrop-filter: blur(8px); font: 850 6px/1 ui-monospace, monospace; letter-spacing: .09em; }
      .decode-state::before { content: ''; display: inline-block; width: 4px; height: 4px; margin-right: 5px; border-radius: 50%; background: #f2b683; box-shadow: 0 0 0 2px rgba(242,182,131,.18); vertical-align: 1px; }
      .decode-state[data-ready="true"]::before { background: #b8e6cf; box-shadow: 0 0 0 2px rgba(184,230,207,.2); }
      .library-badge { color: #203136; background: rgba(247,243,235,.86); border-color: rgba(32,49,54,.16); }
      .scene-caption { display: none; }
    </style>
  </head>
  <body>
    <main class="preview-stage" data-preview-mechanism="blurhash-basis-decoder">
      <div id="blurhash-host" tabindex="0" aria-label="Press Space to replay the BlurHash to coastal retreat photo handoff"></div>
      <section class="stay-copy">
        <small>AEGEAN / 04</small>
        <h1>STAY<br>ABOVE<br>THE TIDE.</h1>
        <p class="stay-dates">2 nights<br>Sep 18—20</p>
      </section>
      <article class="photo-frame" aria-label="Kastro House in Naxos, Greece">
        <div class="stay-meta">
          <div><small>Naxos, Greece</small><strong>Kastro House</strong></div>
          <span class="stay-price">★ 4.9<br>€280 / night</span>
        </div>
      </article>
      <output class="decode-state" id="decode-state" data-ready="false">HASH · WAITING</output>
      <span class="library-badge">p5.js · BlurHash from source</span>
      <span class="scene-caption">same-image hash → quiet coastal stay</span>
    </main>
    <script type="module" src="./src/blurhash-to-photo-progressive-reveal-demo.js"></script>
  </body>
</html>
