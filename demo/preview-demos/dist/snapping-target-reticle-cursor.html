  <style>
    :root{--preview-background:#0b0e0d;color-scheme:dark;--lime:#d9ff54;--amber:#ffba54;--ink:#f4f5ec}
    #inspection-stage{background:#0b0e0d;color:var(--ink);cursor:crosshair;outline:none}.asset-wash,.inspection-image{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}.asset-wash{object-fit:cover;filter:blur(12px) brightness(.58);scale:1.08;opacity:.94}.inspection-image{object-fit:contain;filter:brightness(.72) contrast(1.08)}.inspection-vignette{position:absolute;inset:0;background:linear-gradient(90deg,#090c0bd1 0,transparent 38%,transparent 75%,#090c0b59),linear-gradient(0deg,#080b0ac7 0,transparent 28%,#080b0a3d 100%);pointer-events:none}
    .inspection-bar{position:absolute;z-index:6;left:11px;right:11px;top:9px;display:flex;justify-content:space-between;pointer-events:none;font:800 5px/1 ui-monospace;letter-spacing:.13em;text-transform:uppercase}.inspection-bar span:first-child{display:flex;align-items:center;gap:6px}.inspection-bar span:first-child::before{content:"";width:6px;height:6px;border-radius:2px;background:var(--lime);box-shadow:0 0 9px #d9ff54aa}.inspection-bar span:last-child{color:#9da69f}
    .inspection-copy{position:absolute;z-index:5;left:12px;top:38px;width:104px;pointer-events:none}.inspection-copy small{font:800 5px/1 ui-monospace;letter-spacing:.15em;color:var(--lime)}.inspection-copy h1{margin:7px 0 0;font:950 17px/.86 system-ui;letter-spacing:-.05em;text-shadow:0 2px 14px #000}.inspection-copy p{margin:7px 0 0;font:650 5px/1.35 system-ui;color:#b3bcb5}
    .defect-target{position:absolute;z-index:7;width:44px;height:44px;padding:0;translate:-50% -50%;border:0;background:transparent;color:var(--lime);cursor:crosshair;outline:none}.defect-target::before,.defect-target::after{content:"";position:absolute;inset:10px;border:1px solid transparent;transition:border-color .15s ease,transform .15s ease}.defect-target::after{inset:17px;border-radius:50%;background:transparent}.defect-target:hover::before,.defect-target:focus-visible::before,.defect-target[data-preview="true"]::before{border-color:#d9ff54aa;transform:rotate(45deg)}.defect-target:focus-visible{box-shadow:0 0 0 1px #d9ff5466;border-radius:50%}.defect-id{position:absolute;left:28px;top:4px;padding:3px 4px;border-radius:3px;background:#0b0e0dd9;color:#e8ecdf;opacity:0;white-space:nowrap;font:800 5px/1 ui-monospace;letter-spacing:.08em;pointer-events:none}.defect-target:hover .defect-id,.defect-target:focus-visible .defect-id,.defect-target[data-preview="true"] .defect-id{opacity:1}
    .reticle{position:absolute;z-index:8;left:0;top:0;width:46px;height:46px;translate:-50% -50%;border:1px solid #d9ff54;border-radius:50%;pointer-events:none;filter:drop-shadow(0 0 6px #d9ff5477);transform-origin:center}.reticle::before,.reticle::after{content:"";position:absolute;left:50%;top:50%;translate:-50% -50%;background:#d9ff54}.reticle::before{width:62px;height:1px}.reticle::after{width:1px;height:62px}.reticle-ring{position:absolute;inset:7px;border:1px dashed #d9ff54;border-radius:50%}.reticle-core{position:absolute;left:50%;top:50%;width:4px;height:4px;translate:-50% -50%;border-radius:50%;background:var(--lime)}.reticle[data-snapped="true"]{border-color:var(--amber);filter:drop-shadow(0 0 8px #ffba5488)}.reticle[data-snapped="true"]::before,.reticle[data-snapped="true"]::after,.reticle[data-snapped="true"] .reticle-core{background:var(--amber)}.reticle[data-snapped="true"] .reticle-ring{border-color:var(--amber)}
    .annotation-pin{position:absolute;z-index:7;display:none;translate:-50% -50%;pointer-events:none}.annotation-pin[data-visible="true"]{display:block}.annotation-pin::before{content:"";display:block;width:10px;height:10px;border:2px solid #101410;border-radius:50%;background:var(--lime);box-shadow:0 0 0 1px var(--lime),0 0 13px #d9ff54}.annotation-pin span{position:absolute;left:10px;top:8px;padding:4px 5px;border-radius:4px;background:var(--lime);color:#111510;white-space:nowrap;font:900 5px/1 ui-monospace;letter-spacing:.08em}

    @media(max-width:270px){.inspection-copy{top:35px}.inspection-copy p{display:none}.review-output small{display:none}.undo-button{min-height:40px}.defect-id{left:auto;right:28px}.inspection-bar span:last-child{display:none}}
  </style>

<body>
  <main id="inspection-stage" class="preview-stage" data-preview-mechanism="motion-proximity-snap-inspection-reticle" tabindex="0" aria-label="Composite panel inspection. Move near a defect to snap, click or press Enter to annotate, and use Undo to clear.">
    <img id="asset-wash" class="asset-wash" alt="" aria-hidden="true">
    <img id="inspection-image" class="inspection-image" alt="Graphite composite machinery panel with corrosion, a hairline crack, and a damaged fastener">
    <div class="inspection-vignette"></div>
    <header class="inspection-bar"><span>QA Vision / Panel 07</span><span>Motion · assisted reticle</span></header>
    <section class="inspection-copy"><small>HUMAN REVIEW REQUIRED</small><h1>VERIFY THE DEFECT. KEEP THE EVIDENCE.</h1><p>Approach a signal to snap. Confirm only after visual review.</p></section>
    <button class="defect-target" type="button" data-index="0" data-preview="false" aria-label="Corrosion candidate COR-17"><span class="defect-id">COR-17</span></button>
    <button class="defect-target" type="button" data-index="1" data-preview="false" aria-label="Crack candidate CRK-04"><span class="defect-id">CRK-04</span></button>
    <button class="defect-target" type="button" data-index="2" data-preview="false" aria-label="Fastener candidate FST-09"><span class="defect-id">FST-09</span></button>
    <div id="reticle" class="reticle" data-snapped="false"><i class="reticle-ring"></i><i class="reticle-core"></i></div>
    <div id="annotation-pin" class="annotation-pin" data-visible="false"><span id="annotation-label">—</span></div>
    <footer class="review-rail"><button id="undo-annotation" class="undo-button" type="button" disabled>UNDO MARK</button><span class="review-output"><small>REVIEW STATE</small><output id="review-output">AWAITING HUMAN INPUT</output></span></footer>
  </main>
