<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Theatre.js — Visually Authored Keyframe Sequence</title>
    <link rel="stylesheet" href="./shared.css" />
    <style>
      :root { --preview-background: #e9e5dc; color-scheme: light; }
      .editor-panel { position: absolute; inset: 37px 11px 19px; overflow: hidden; border: 1px solid #171b25; border-radius: 13px; background: #11141d; box-shadow: 0 14px 28px #2b2b3326; }
      .sequence-viewport { position: absolute; inset: 0 0 39px; overflow: hidden; background: radial-gradient(circle at 68% 30%, #3a3155, transparent 36%), linear-gradient(135deg, #1b2030, #10131c); }
      .sequence-viewport::before { content: ''; position: absolute; inset: 0; opacity: .24; background-image: linear-gradient(#ffffff18 1px, transparent 1px), linear-gradient(90deg, #ffffff18 1px, transparent 1px); background-size: 20px 20px; }
      .object-label { position: absolute; z-index: 4; top: 7px; left: 9px; color: #ffffff70; font: 800 6px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .12em; }
      .motion-path { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; }
      .motion-path path { fill: none; stroke: #d8d0ff70; stroke-width: 1; stroke-dasharray: 3 4; }
      .pose-ghost { position: absolute; z-index: 1; width: 7px; height: 7px; margin: -4px 0 0 -4px; border: 1px solid #fff9; transform: rotate(45deg); background: #151925; box-shadow: 0 0 0 3px #ffffff0a; }
      .actor-card { position: absolute; z-index: 3; left: 119px; top: 32px; display: grid; width: 58px; height: 42px; place-items: center; border: 1px solid #ffffffc9; color: #10131c; box-shadow: 0 10px 22px #0009, 0 0 21px hsl(var(--tone, 185) 85% 60% / .32); transform-origin: center; will-change: transform, border-radius, background-color; }
      .actor-card::before { content: ''; position: absolute; inset: 5px; border: 1px solid #1118272c; border-radius: inherit; }
      .actor-card::after { content: 'KEYFRAME'; position: relative; font: 900 7px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .08em; }
      .timeline { position: absolute; left: 0; right: 0; bottom: 0; height: 39px; border-top: 1px solid #ffffff1f; background: #171b26; }
      .time-readout { position: absolute; top: 5px; left: 9px; color: #f5f0e6; font: 800 7px/1 ui-monospace, SFMono-Regular, Menlo, monospace; }
      .track-label { position: absolute; top: 5px; right: 9px; color: #969caf; font: 700 6px/1 ui-monospace, SFMono-Regular, Menlo, monospace; letter-spacing: .1em; }
      .timeline-rail { position: absolute; left: 14px; right: 14px; bottom: 8px; height: 1px; background: #ffffff2c; }
      .timeline-keyframe { position: absolute; top: -4px; width: 8px; height: 8px; margin-left: -4px; border: 1px solid #c7cada; transform: rotate(45deg); background: #272d3b; transition: none; }
      .timeline-keyframe.passed { border-color: #ffdc84; background: #ffb55f; box-shadow: 0 0 8px #ffad4c99; }
      .playhead { position: absolute; z-index: 5; top: 17px; bottom: 3px; width: 1px; background: #ff5f8f; box-shadow: 0 0 8px #ff5f8f; }
      .playhead::before { content: ''; position: absolute; top: -2px; left: -3px; width: 7px; height: 5px; clip-path: polygon(0 0, 100% 0, 50% 100%); background: #ff5f8f; }
      .library-badge { color: #1b2029; border-color: #1b20292b; background: #fffdf7dc; }
      .scene-caption { color: #53545b; }
    </style>
  </head>
  <body>
    <main class="preview-stage" aria-label="A real Theatre.js project playing a saved visually authored keyframe sequence">
      <section class="editor-panel" data-preview-mechanism="theatre-keyframe-sequence">
        <div class="sequence-viewport">
          <span class="object-label">SCENE / HERO CARD</span>
          <svg class="motion-path" viewBox="0 0 296 87" preserveAspectRatio="none" aria-hidden="true"><path d="M62 71 C90 70 94 26 120 31 S188 76 214 63 S184 19 172 25 S105 75 62 71" /></svg>
          <i class="pose-ghost" style="left: 62px; top: 71px"></i>
          <i class="pose-ghost" style="left: 120px; top: 31px"></i>
          <i class="pose-ghost" style="left: 214px; top: 63px"></i>
          <i class="pose-ghost" style="left: 172px; top: 25px"></i>
          <div class="actor-card" id="theatre-actor" aria-hidden="true"></div>
        </div>
        <div class="timeline" aria-hidden="true">
          <span class="time-readout" id="time-readout">0.00 s</span>
          <span class="track-label">X · Y · ROTATE · SCALE</span>
          <div class="timeline-rail">
            <i class="timeline-keyframe" data-position="0" style="left: 0%"></i>
            <i class="timeline-keyframe" data-position="0.7" style="left: 23.333%"></i>
            <i class="timeline-keyframe" data-position="1.5" style="left: 50%"></i>
            <i class="timeline-keyframe" data-position="2.25" style="left: 75%"></i>
            <i class="timeline-keyframe" data-position="3" style="left: 100%"></i>
          </div>
          <i class="playhead" id="playhead"></i>
        </div>
      </section>
      <span class="library-badge">Theatre.js · saved sequence</span>
      <span class="scene-caption">authored values travel through five keyed poses</span>
    </main>
    <script type="module" src="./src/theatre-keyframe-demo.js"></script>
  </body>
</html>
